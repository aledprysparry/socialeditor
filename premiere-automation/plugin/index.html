<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <link rel="stylesheet" href="css/panel.css"/>
</head>
<body>

  <header>
    <div class="header-left">
      <div class="brand-mark">IS</div>
      <h1>Infographic Studio</h1>
    </div>
    <span class="status-pill" id="status">Idle</span>
  </header>

  <!-- Step 1: Select folder -->
  <section class="card">
    <div class="card-row">
      <button class="btn btn-primary" id="selectFolder">Select Export Folder</button>
    </div>
    <div class="file-path" id="folderPath">No folder selected</div>
  </section>

  <!-- Step 2: Load manifest -->
  <section class="card">
    <div class="card-row">
      <button class="btn" id="loadManifest">Load Manifest</button>
      <span class="meta" id="manifestStatus">Not loaded</span>
    </div>
    <div class="stat-row hidden" id="manifestStats">
      <div class="stat"><span class="stat-val" id="m-items">0</span><span class="stat-label">Items</span></div>
      <div class="stat"><span class="stat-val" id="m-fps">25</span><span class="stat-label">FPS</span></div>
      <div class="stat"><span class="stat-val" id="m-res">1920x1080</span><span class="stat-label">Res</span></div>
      <div class="stat"><span class="stat-val" id="m-tracks">0</span><span class="stat-label">Tracks</span></div>
    </div>
  </section>

  <!-- Step 3: Actions -->
  <section class="card actions-card">
    <button class="btn btn-action" id="validate" disabled>Validate</button>
    <button class="btn btn-action btn-accent" id="import" disabled>Import Sequences</button>
    <button class="btn btn-action btn-accent" id="build" disabled>Build Timeline</button>
  </section>

  <!-- Results -->
  <section class="card hidden" id="resultsCard">
    <h3>Results</h3>
    <div class="stat-row" id="resultStats">
      <div class="stat"><span class="stat-val ok" id="r-ok">0</span><span class="stat-label">OK</span></div>
      <div class="stat"><span class="stat-val warn" id="r-warn">0</span><span class="stat-label">Warn</span></div>
      <div class="stat"><span class="stat-val fail" id="r-fail">0</span><span class="stat-label">Failed</span></div>
    </div>
    <ul class="item-list" id="itemList"></ul>
  </section>

  <!-- Log -->
  <section class="card">
    <div class="card-row">
      <h3>Log</h3>
      <button class="btn btn-sm btn-ghost" id="clearLog">Clear</button>
    </div>
    <pre class="log-area" id="log"></pre>
  </section>

  <script src="js/panel.js"></script>
</body>
</html>
