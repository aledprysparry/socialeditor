<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <link rel="stylesheet" href="css/panel.css"/>
</head>
<body>
  <div class="panel">

    <!-- Header -->
    <div class="header">
      <h1>Infographic Studio</h1>
      <span class="version">v1.0</span>
    </div>

    <!-- Step 1: Load Manifest -->
    <div class="card" id="step1">
      <div class="card-header">
        <div class="step-num active" id="step1-num">1</div>
        <h2>Load Manifest</h2>
        <span class="status status-pending" id="step1-status">Ready</span>
      </div>
      <div class="btn-row" style="margin-bottom:8px">
        <button class="btn btn-primary" id="btn-load">Select manifest.json</button>
      </div>
      <div class="file-path hidden" id="manifest-path">No file selected</div>
    </div>

    <!-- Step 2: Validate -->
    <div class="card" id="step2">
      <div class="card-header">
        <div class="step-num" id="step2-num">2</div>
        <h2>Validate</h2>
        <span class="status status-pending" id="step2-status">Waiting</span>
      </div>
      <div class="stat-grid hidden" id="val-stats">
        <div class="stat-item"><div class="value" id="val-total">0</div><div class="label">Items</div></div>
        <div class="stat-item"><div class="value" id="val-valid">0</div><div class="label">Valid</div></div>
        <div class="stat-item"><div class="value" id="val-fps">25</div><div class="label">FPS</div></div>
        <div class="stat-item"><div class="value" id="val-tracks">0</div><div class="label">Tracks</div></div>
      </div>
      <ul class="issue-list hidden" id="val-issues"></ul>
    </div>

    <!-- Step 3: Import Media -->
    <div class="card" id="step3">
      <div class="card-header">
        <div class="step-num" id="step3-num">3</div>
        <h2>Import Media</h2>
        <span class="status status-pending" id="step3-status">Waiting</span>
      </div>
      <div class="btn-row hidden" id="import-controls">
        <button class="btn btn-primary" id="btn-import">Import Sequences</button>
      </div>
      <div class="stat-grid hidden" id="import-stats">
        <div class="stat-item"><div class="value" id="imp-done">0</div><div class="label">Imported</div></div>
        <div class="stat-item"><div class="value" id="imp-failed">0</div><div class="label">Failed</div></div>
      </div>
    </div>

    <!-- Step 4: Build Timeline -->
    <div class="card" id="step4">
      <div class="card-header">
        <div class="step-num" id="step4-num">4</div>
        <h2>Build Timeline</h2>
        <span class="status status-pending" id="step4-status">Waiting</span>
      </div>
      <div class="btn-row hidden" id="timeline-controls">
        <button class="btn btn-primary" id="btn-timeline">Place on Timeline</button>
      </div>
      <div class="stat-grid hidden" id="timeline-stats">
        <div class="stat-item"><div class="value" id="tl-placed">0</div><div class="label">Placed</div></div>
        <div class="stat-item"><div class="value" id="tl-failed">0</div><div class="label">Failed</div></div>
      </div>
    </div>

    <!-- Step 5: Report -->
    <div class="card hidden" id="step5">
      <div class="card-header">
        <div class="step-num done" id="step5-num">5</div>
        <h2>Report</h2>
        <span class="status status-done" id="step5-status">Complete</span>
      </div>
      <div class="log-area" id="report-log"></div>
    </div>

  </div>

  <script src="js/panel.js"></script>
</body>
</html>
