  const [editingIdx,setEditingIdx]=useState(null);

  // Keyboard shortcuts (must be after editingIdx declaration)
  useEffect(()=>{
    const handler=(e)=>{
      const tag=e.target.tagName;
      if(tag==="INPUT"||tag==="TEXTAREA"||tag==="SELECT") return;
      if(e.key==="Escape"&&editingIdx!==null){e.preventDefault();setEditingIdx(null);}
      if(e.key==="ArrowLeft"&&editingIdx!==null){e.preventDefault();setEditingIdx(Math.max(0,editingIdx-1));}
      if(e.key==="ArrowRight"&&editingIdx!==null){e.preventDefault();setEditingIdx(Math.min(graphics.length-1,editingIdx+1));}
    };
    window.addEventListener("keydown",handler);
    return()=>window.removeEventListener("keydown",handler);
  },[editingIdx,graphics.length]);
  const [dragIdx,setDragIdx]=useState(null);
  const [dragOverIdx,setDragOverIdx]=useState(null);
  const handleDrop=(fromIdx,toIdx)=>{
    if(fromIdx===toIdx||fromIdx==null||toIdx==null) return;
    const ng=[...graphics];
    const [moved]=ng.splice(fromIdx,1);
    ng.splice(toIdx,0,moved);
    // Update timecodes to match new order (optional — keeps manual reorder)
    updateProject({graphics:ng,selected:ng.map((_,i)=>i),previews:{}});
    setDragIdx(null);setDragOverIdx(null);
  };
  const [regenLoading,setRegenLoading]=useState(false);

  const regenerateSegment=async(i,prompt,templateHint)=>{
    setRegenLoading(true);
    try{
      const tplConstraint=templateHint&&templateHint!=="any"?`\nYou MUST use the "${templateHint}" template.`:"";
      const raw=await callAI({system:SEGMENT_PROMPT+tplConstraint,messages:[{role:"user",content:prompt}],max_tokens:800});
      const newG=JSON.parse(raw.replace(/```json|```/g,"").trim());
      const ng=[...graphics];
      const old=ng[i];
      ng[i]={...newG,prompt,templateHint:templateHint||newG.template,typeOverride:old?.typeOverride};
      updateProject({graphics:ng,previews:{...previews,[i]:undefined}});
      // Auto-preview
      setTimeout(()=>{const c=document.createElement("canvas");drawGraphic(c,ng[i],brand,previewRatio,1);setPreviews(p=>({...p,[i]:c.toDataURL("image/png")}));},100);
    }catch(e){alert("Regeneration failed: "+e.message);}
    setRegenLoading(false);
  };

  const updateGraphicContent=(i,changes,metaChanges)=>{
    let updated;
    updateProject(prev=>{
      const ng=[...(prev.graphics||[])];
      ng[i]={...ng[i],...(metaChanges||{}),content:{...ng[i].content,...changes}};
      updated=ng[i];
      return {graphics:ng,previews:{...(prev.previews||{}),[i]:undefined}};
    });
    setTimeout(()=>{if(updated){const c=document.createElement("canvas");drawGraphic(c,updated,brand,previewRatio,1);setPreviews(p=>({...p,[i]:c.toDataURL("image/png")}));}},100);
  };

  const updateGraphicMeta=(i,changes)=>{
    let updated;
    updateProject(prev=>{
      const ng=[...(prev.graphics||[])];
      ng[i]={...ng[i],...changes};
      updated=ng[i];
      return {graphics:ng,previews:{...(prev.previews||{}),[i]:undefined}};
    });
    setTimeout(()=>{if(updated){const c=document.createElement("canvas");drawGraphic(c,updated,brand,previewRatio,1);setPreviews(p=>({...p,[i]:c.toDataURL("image/png")}));}},100);
  };

  // ── AI Social Media Review ──
  const runReview=async()=>{
    if(!graphics.length) return;
    setReviewing(true); setReviewResults(null);

      const graphicsSummary=graphics.map((g,i)=>`#${i+1} [${g.template}] at ${g.timestamp||"?"}: ${JSON.stringify(g.content)}`).join("\n");
      const raw=await callAI({
        system:REVIEW_PROMPT,
        messages:[{role:"user",content:`VIDEO TITLE: "${project.name}"\n\nTRANSCRIPT:\n${transcript}\n\nGRAPHICS TO REVIEW:\n${graphicsSummary}`}],
        max_tokens:3000
      });
      const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
      setReviewResults(parsed);
    }catch(e){ alert("Review failed: "+e.message); }
    setReviewing(false);
  };

  const applyReviewSuggestion=(i,suggestions)=>{
    updateGraphicContent(i,suggestions,{});
  };

  const applyAllReviewSuggestions=()=>{
    if(!reviewResults) return;
    reviewResults.forEach(r=>{
      if(r.verdict!=="ok"&&r.verdict!=="remove"&&r.suggestions&&Object.keys(r.suggestions).length){

        </div>

        </div>

      {/* PRIMARY TOOLBAR — 4 actions + count */}
      <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center",flexWrap:"wrap"}}>

        <button style={sm} onClick={previewAll} title="Preview all graphics">👁 Preview</button>
        <button style={{...sm,background:reviewing?"rgba(255,200,50,0.15)":"rgba(255,200,50,0.1)",border:"1px solid rgba(255,200,50,0.35)",opacity:reviewing?0.6:1,cursor:reviewing?"wait":"pointer"}} onClick={()=>!reviewing&&runReview()} title="AI Social Media Expert reviews all slides">
          {reviewing?"⏳ Reviewing...":"🧠 AI Review"}

        <span style={{fontSize:11,color:DS.textMuted,marginLeft:"auto"}}>{graphics.length} graphics{filterTpl?` (${filteredGraphics.length} shown)`:""}</span>

      {/* AI Review Results Panel */}
      {reviewResults&&(

            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {reviewResults.map((r,ri)=>{
              const verdictColor=r.verdict==="ok"?"rgba(42,157,143,0.8)":r.verdict==="tweak"?"rgba(255,200,50,0.8)":r.verdict==="rewrite"?"rgba(230,57,70,0.8)":"rgba(150,150,150,0.6)";
              const hasSuggestions=r.suggestions&&Object.keys(r.suggestions).length>0;
              return(
                <div key={ri} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${DS.borderSubtle}`,borderRadius:DS.rSm,padding:"10px 14px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:r.issues?.length||hasSuggestions?8:0}}>
                    <span style={{fontWeight:800,fontSize:12,color:verdictColor,textTransform:"uppercase",background:`${verdictColor}22`,padding:"2px 8px",borderRadius:4}}>{r.verdict}</span>
                    <span style={{fontSize:13,fontWeight:600,opacity:0.7}}>Slide #{(r.index||ri)+1} — {graphics[r.index||ri]?.template||"?"}</span>
                    {hasSuggestions&&r.verdict!=="ok"&&(
                      <button style={{...btn({fontSize:10,padding:"3px 10px"}),marginLeft:"auto",background:"rgba(42,157,143,0.15)",border:"1px solid rgba(42,157,143,0.3)"}} onClick={()=>{applyReviewSuggestion(r.index||ri,r.suggestions);doPreview(graphics[r.index||ri],r.index||ri);}}>Apply</button>
                    )}
                  </div>
                  {r.issues?.length>0&&<div style={{fontSize:12,opacity:0.6,marginBottom:hasSuggestions?6:0}}>{r.issues.join(" · ")}</div>}
                  {hasSuggestions&&r.verdict!=="ok"&&(
                    <div style={{fontSize:12,opacity:0.8,fontFamily:"monospace",background:"rgba(0,0,0,0.15)",padding:"6px 10px",borderRadius:4}}>
                      {Object.entries(r.suggestions).map(([k,v])=><div key={k}><span style={{opacity:0.5}}>{k}:</span> {v}</div>)}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}
      {/* SECONDARY TOOLBAR — collapsed by default */}
      {showMoreActions&&(
      <div style={{display:"flex",gap:6,marginBottom:10,alignItems:"center",flexWrap:"wrap",padding:`${DS.sm}px ${DS.md}px`,background:"rgba(255,255,255,0.02)",borderRadius:DS.rSm,border:`1px solid ${DS.borderSubtle}`}}>
        <select value={filterTpl} onChange={e=>setFilterTpl(e.target.value)}
          style={{background:DS.bgButton,border:`1px solid ${DS.borderSubtle}`,borderRadius:DS.rSm,padding:"5px 8px",color:DS.textSecondary,fontSize:11,fontFamily:"inherit",outline:"none"}}>

        <button style={sm} onClick={()=>{
          const seen=new Map();graphics.forEach((g,i)=>{const key=g.label||`${g.template}_${g.timestamp}`;seen.set(key,i);});

        <button style={{...sm,color:DS.textMuted}} onClick={()=>{if(confirm(`Clear all ${graphics.length} graphics?`)){setGraphics([]);setGStep("review");}}} title="Clear list (keeps SRT)">🗑 Clear</button>
        <button style={btnDanger({padding:"5px 10px",fontSize:10})} onClick={()=>{setGraphics([]);setGStep("idle");}} title="Re-analyse from scratch">↺ Re-analyse</button>
        <select style={{...inputS({width:"auto",padding:"5px 8px",fontSize:10}),background:"#FB8770",color:"#fff",fontWeight:700,borderColor:"#FB8770",cursor:"pointer"}} onChange={e=>{
          const ver=e.target.value;e.target.value="";if(!ver)return;

//  POSTER TAB — AI-generated social media posters
// ═══════════════════════════════════════════════════════════════
const POSTER_RATIOS={"16:9":{W:1920,H:1080,label:"YouTube / LinkedIn"},"1:1":{W:1080,H:1080,label:"Instagram Feed"},"4:5":{W:1080,H:1350,label:"Instagram Feed (tall)"},"9:16":{W:1080,H:1920,label:"Stories / Reels"}};
const POSTER_TONES=[{id:"shocking",label:"Shocking",icon:"⚡",desc:"Bold stat or surprising claim"},{id:"relatable",label:"Relatable",icon:"💬",desc:"Speaks to everyday experience"},{id:"informative",label:"Informative",icon:"📊",desc:"Clear, authoritative, data-driven"}];

const POSTER_PROMPT=`You are a social media copywriter creating poster text variations. Given a topic, audience, and goal, generate exactly 3 copy variations.

Return ONLY a valid JSON array. No markdown, no preamble.

Each item: {"tone":"shocking"|"relatable"|"informative","hook":"BOLD HEADLINE (max 8 words, all caps)","subtext":"supporting line (max 15 words)","cta":"call to action (max 4 words)"}

Rules:
- Hook must create tension: question, contradiction, or surprising stat
- Never start with "Did you know"
- Never use "we" or "our" — talk TO the audience
- Each variation must be structurally different
- CTA is an action verb phrase: "Watch now", "Learn more", "Get the facts"
- Keep all text SHORT — readable at phone thumbnail size in 1.5 seconds`;

function drawPoster(canvas,poster,brand,ratio){
  const AR=POSTER_RATIOS[ratio]||POSTER_RATIOS["1:1"];
  const W=AR.W,H=AR.H;canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext("2d");
  const sc=Math.min(W,H)/1080;
  const B=brand||{};
  const FF=B.fontFamily||"DM Sans";
  const FFS=B.fontSerif||"Lora";
  const CW=B.colorWarm||"#f0e1d3";
  const R=Math.round((B.cornerRadius||20)*sc);
  const isPortrait=H>W;
  const PAD=Math.round((isPortrait?60:80)*sc);

  // Background — brand primary colour
  ctx.fillStyle=B.colorPrimary||"#1a5c5e";ctx.fillRect(0,0,W,H);

  // Subtle wavy texture
  ctx.save();ctx.globalAlpha=0.06;ctx.strokeStyle="#fff";ctx.lineWidth=Math.round(3*sc);
  for(let i=0;i<5;i++){const off=i*W*0.22;ctx.beginPath();for(let x=-50;x<W+50;x+=4){ctx.lineTo(x,H*0.3+Math.sin((x+off)*0.003)*H*0.25+i*H*0.12);}ctx.stroke();}
  ctx.restore();

  // Content layout
  const tone=poster.tone||"informative";
  const accentCol=tone==="shocking"?B.colorAccent||"#FB8770":tone==="relatable"?B.colorPositive||"#83A381":B.colorPrimary||"#1a5c5e";

  if(isPortrait){
    // 9:16 / 4:5 — vertical stack centred
    const safeTop=ratio==="9:16"?220:60;
    const safeBot=ratio==="9:16"?420:60;
    const contentH=H-safeTop-safeBot;
    let y=safeTop+contentH*0.15;

    // Tone badge
    const toneLabel=POSTER_TONES.find(t=>t.id===tone);
    ctx.font=`600 ${Math.round(22*sc)}px "${FF}","Arial",sans-serif`;ctx.fillStyle="rgba(255,255,255,0.4)";ctx.textAlign="center";ctx.textBaseline="top";
    ctx.fillText((toneLabel?.icon||"")+" "+(toneLabel?.label||tone).toUpperCase(),W/2,y);
    y+=Math.round(50*sc);

    // Hook — big serif
    ctx.font=`800 ${Math.round(72*sc)}px "${FFS}","serif"`;ctx.fillStyle="#fff";ctx.textAlign="center";ctx.textBaseline="top";
    const hookLines=wrapText(ctx,poster.hook||"HOOK TEXT",W-PAD*2);
    hookLines.forEach(line=>{ctx.fillText(line,W/2,y);y+=Math.round(82*sc);});
    y+=Math.round(20*sc);

    // Accent rule
    const ruleW=Math.round(80*sc);
    ctx.fillStyle=accentCol;ctx.fillRect(W/2-ruleW/2,y,ruleW,Math.round(4*sc));
    y+=Math.round(40*sc);

    // Subtext
    ctx.font=`400 ${Math.round(36*sc)}px "${FF}","Arial",sans-serif`;ctx.fillStyle="rgba(255,255,255,0.75)";
    const subLines=wrapText(ctx,poster.subtext||"Supporting text here",W-PAD*3);
    subLines.forEach(line=>{ctx.fillText(line,W/2,y);y+=Math.round(44*sc);});
    y+=Math.round(40*sc);

    // CTA button
    const ctaText=poster.cta||"Learn more";
    ctx.font=`700 ${Math.round(28*sc)}px "${FF}","Arial",sans-serif`;
    const ctaW=ctx.measureText(ctaText).width+Math.round(60*sc);
    const ctaH=Math.round(56*sc);const ctaX=W/2-ctaW/2;
    rrPath(ctx,ctaX,y,ctaW,ctaH,Math.round(ctaH/2));ctx.fillStyle=accentCol;ctx.fill();
    ctx.fillStyle="#fff";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(ctaText,W/2,y+ctaH/2);
  } else {
    // 16:9 / 1:1 — left-aligned editorial
    let y=H*0.18;
    const textW=isPortrait?W-PAD*2:W*0.6;

    // Tone badge
    const toneLabel=POSTER_TONES.find(t=>t.id===tone);
    ctx.font=`600 ${Math.round(20*sc)}px "${FF}","Arial",sans-serif`;ctx.fillStyle="rgba(255,255,255,0.4)";ctx.textAlign="left";ctx.textBaseline="top";
    ctx.fillText((toneLabel?.icon||"")+" "+(toneLabel?.label||tone).toUpperCase(),PAD,y);
    y+=Math.round(44*sc);

    // Hook — big serif
    ctx.font=`800 ${Math.round(80*sc)}px "${FFS}","serif"`;ctx.fillStyle="#fff";ctx.textAlign="left";ctx.textBaseline="top";
    const hookLines=wrapText(ctx,poster.hook||"HOOK TEXT",textW);
    hookLines.forEach(line=>{ctx.fillText(line,PAD,y);y+=Math.round(90*sc);});
    y+=Math.round(10*sc);

    // Accent rule
    ctx.fillStyle=accentCol;ctx.fillRect(PAD,y,Math.round(80*sc),Math.round(4*sc));
    y+=Math.round(36*sc);

    // Subtext
    ctx.font=`400 ${Math.round(32*sc)}px "${FF}","Arial",sans-serif`;ctx.fillStyle="rgba(255,255,255,0.7)";ctx.textAlign="left";
    const subLines=wrapText(ctx,poster.subtext||"Supporting text here",textW);
    subLines.forEach(line=>{ctx.fillText(line,PAD,y);y+=Math.round(40*sc);});
    y+=Math.round(30*sc);

    // CTA button
    const ctaText=poster.cta||"Learn more";
    ctx.font=`700 ${Math.round(24*sc)}px "${FF}","Arial",sans-serif`;
    const ctaW=ctx.measureText(ctaText).width+Math.round(50*sc);
    const ctaH=Math.round(48*sc);
    rrPath(ctx,PAD,y,ctaW,ctaH,Math.round(ctaH/2));ctx.fillStyle=accentCol;ctx.fill();
    ctx.fillStyle="#fff";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(ctaText,PAD+ctaW/2,y+ctaH/2);
  }

  // Brand logo stamp
  stamp(ctx,B,W,H,H>W*1.2);
}

// Simple word wrap helper for poster text
function wrapText(ctx,text,maxW){
  const words=text.split(" ");const lines=[];let line="";
  for(const w of words){
    const test=line?line+" "+w:w;
    if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w;}
    else line=test;
  }
  if(line)lines.push(line);
  return lines;
}

function PosterTab({project,brand,updateProject}){
  const [topic,setTopic]=useState("");
  const [audience,setAudience]=useState("");
  const [goal,setGoal]=useState("");
  const [variations,setVariations]=useState(project.posters||[]);
  const [generating,setGenerating]=useState(false);
  const [error,setError]=useState("");
  const [previews,setPreviews]=useState({});
  const [selectedRatio,setSelectedRatio]=useState("1:1");

  // Generate previews when variations or ratio change
  useEffect(()=>{
    if(!variations.length)return;
    const batch={};
    variations.forEach((v,i)=>{
      const c=document.createElement("canvas");
      drawPoster(c,v,brand,selectedRatio);
      batch[i]=c.toDataURL("image/png");
    });
    setPreviews(batch);
  },[variations,selectedRatio,brand]);

  const generate=async()=>{
    if(!topic.trim()){setError("Enter a topic first");return;}
    setGenerating(true);setError("");
    try{
      const raw=await callAI({system:POSTER_PROMPT,messages:[{role:"user",content:`Topic: ${topic}\nAudience: ${audience||"general"}\nGoal: ${goal||"engagement"}\nBrand: ${brand.name||"CPS Homes"}`}],max_tokens:1500});
      const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
      setVariations(parsed);
      updateProject({posters:parsed});
    }catch(e){setError("Generation failed: "+e.message);}
    setGenerating(false);
  };

  const exportPoster=async(poster,i)=>{
    const pn=project.name.replace(/\s+/g,"_");
    for(const [ratio,ar] of Object.entries(POSTER_RATIOS)){
      const c=document.createElement("canvas");
      drawPoster(c,poster,brand,ratio);
      await new Promise(res=>{c.toBlob(blob=>{
        if(blob)dl(blob,`${pn}_poster_${poster.tone}_${ratio.replace(":","x")}.png`);
        res();
      },"image/png");});
      await new Promise(r=>setTimeout(r,200));
    }
  };

  const exportAll=async()=>{
    for(let i=0;i<variations.length;i++) await exportPoster(variations[i],i);
  };

  return(
    <div>
      {/* Input form */}
      <div style={card({padding:DS.lg,marginBottom:DS.lg})}>
        <div style={sectionHead()}>Generate Social Posters</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:DS.md,marginBottom:DS.md}}>
          <div>
            <div style={label()}>Topic *</div>
            <input style={inputS({width:"100%"})} value={topic} onChange={e=>setTopic(e.target.value)} placeholder="e.g. Rent increases in Wales 2026"/>
          </div>
          <div>
            <div style={label()}>Audience</div>
            <input style={inputS({width:"100%"})} value={audience} onChange={e=>setAudience(e.target.value)} placeholder="e.g. Landlords in Cardiff"/>
          </div>
          <div>
            <div style={label()}>Goal</div>
            <input style={inputS({width:"100%"})} value={goal} onChange={e=>setGoal(e.target.value)} placeholder="e.g. Drive video views"/>
          </div>
        </div>
        <div style={{display:"flex",gap:DS.md,alignItems:"center"}}>
          <button style={{background:brand.colorAccent||DS.accent,border:"none",borderRadius:11,padding:"12px 32px",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",opacity:generating?0.6:1}} onClick={generate} disabled={generating}>
            {generating?"🔄 Generating…":"✨ Generate 3 Variations"}
          </button>
          {error&&<span style={{color:DS.accent,fontSize:DS.fsSm}}>{error}</span>}
        </div>
      </div>

      {/* Ratio picker */}
      {variations.length>0&&(
        <div style={{display:"flex",gap:DS.sm,marginBottom:DS.lg,alignItems:"center"}}>
          <span style={label({marginBottom:0})}>Preview ratio:</span>
          {Object.entries(POSTER_RATIOS).map(([k,v])=>(
            <button key={k} style={btn({background:selectedRatio===k?DS.borderActive:DS.bgButton,fontSize:12,padding:"5px 12px",fontWeight:selectedRatio===k?700:500})} onClick={()=>setSelectedRatio(k)}>
              {k} <span style={{fontSize:10,opacity:0.6}}>{v.label}</span>
            </button>
          ))}
          <button style={{...btnPositive({padding:"8px 18px",fontSize:DS.fsSm,marginLeft:"auto"}),fontWeight:700}} onClick={exportAll}>
            ⬇ Export All ({Object.keys(POSTER_RATIOS).length*variations.length} PNGs)
          </button>
        </div>
      )}

      {/* Poster grid */}
      {variations.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:DS.lg}}>
          {variations.map((v,i)=>{
            const toneInfo=POSTER_TONES.find(t=>t.id===v.tone)||{icon:"📄",label:v.tone};
            return(
              <div key={i} style={card({padding:0,overflow:"hidden"})}>
                {/* Preview image */}
                {previews[i]&&<img src={previews[i]} alt={v.hook} style={{width:"100%",display:"block",borderRadius:`${DS.rMd}px ${DS.rMd}px 0 0`}}/>}
                {/* Content */}
                <div style={{padding:DS.md}}>
                  <div style={{display:"flex",alignItems:"center",gap:DS.sm,marginBottom:DS.sm}}>
                    <span style={{fontSize:18}}>{toneInfo.icon}</span>
                    <span style={{fontWeight:700,fontSize:DS.fsSm,textTransform:"uppercase",letterSpacing:"0.05em"}}>{toneInfo.label}</span>
                  </div>
                  <div style={{fontWeight:700,fontSize:DS.fsMd,marginBottom:DS.xs,fontFamily:`"${brand.fontSerif||"Lora"}",serif`}}>{v.hook}</div>
                  <div style={{fontSize:DS.fsSm,color:DS.textSecondary,marginBottom:DS.sm}}>{v.subtext}</div>
                  <div style={{display:"flex",gap:DS.sm}}>

                      const edited=prompt("Edit hook:",v.hook);
                      if(edited!==null){const nv=[...variations];nv[i]={...v,hook:edited};setVariations(nv);updateProject({posters:nv});}
                    }}>✏ Edit</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Empty state */}
      {!variations.length&&!generating&&(
        <div style={emptyState({padding:"60px 0"})}>
          <div style={{fontSize:42,marginBottom:DS.md}}>🖼</div>
          <div style={{fontSize:DS.fsLg,fontWeight:700}}>Social Media Poster Studio</div>
          <div style={{fontSize:DS.fsSm,color:DS.textMuted,marginTop:DS.xs,maxWidth:400}}>
            Enter a topic above and AI will generate 3 copy variations — each rendered as 4 poster sizes ready for Instagram, TikTok, LinkedIn, and YouTube.
          </div>
        </div>
      )}
    </div>
  );
}

function ExportTab({project,brand,updateProject}){
  const [ratios,setRatios]=useState({"16:9":true,"1:1":false,"9:16":false});
  const [previewRatio,setPreviewRatio]=useState("16:9");
  const [mode,setMode]=useState("idle"); // idle | confirming | running | done
  const [phase,setPhase]=useState("");
  const [prog,setProg]=useState({done:0,total:0,pct:0});
  const [captionMode,setCaptionMode]=useState("composite"); // composite | individual
  const [includeCaptions,setIncludeCaptions]=useState(false);
  const [convertMov,setConvertMov]=useState(false);
  const [ffmpegLoading,setFfmpegLoading]=useState(false);
  const [gfxMode,setGfxMode]=useState("premiere"); // premiere | png | webm | pngseq | composite | both
  const cvs=useRef(document.createElement("canvas"));

  const selectedRatios=Object.entries(ratios).filter(([,v])=>v).map(([k])=>k);
  const graphics=project.graphics;
  const selectedGfx=(project.selected||[]).map(i=>graphics[i]).filter(Boolean);
  const subtitles=project.subtitles;
  const captionStyle=project.captionStyle||"tiktok";

  const dl=(blob,name)=>{const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();};
  const dlText=(text,name)=>dl(new Blob([text],{type:"text/plain"}),name);

  // ── Cue Sheet (.docx) ──
  const exportCueSheet=async()=>{
    // docx library: available via npm (Next.js) or CDN global window.docx (standalone)
    const dx=typeof window!=="undefined"&&window.docx?window.docx:{Document,Packer,Paragraph,TextRun,Table,TableRow,TableCell,HeadingLevel,AlignmentType,BorderStyle,WidthType,ShadingType};
    const {Document:Doc,Packer:Pk,Paragraph:Para,TextRun:TR,Table:Tbl,TableRow:TblRow,TableCell:TblCell,HeadingLevel:HL,AlignmentType:AT,BorderStyle:BS,WidthType:WT,ShadingType:ST}=dx;
    const border={style:BS.SINGLE,size:1,color:"CCCCCC"};
    const borders={top:border,bottom:border,left:border,right:border};
    const cellMar={top:60,bottom:60,left:100,right:100};
    const hdrShade={fill:"1B4965",type:ST.CLEAR};
    const hdrRun=(t)=>new TR({text:t,bold:true,color:"FFFFFF",font:"Arial",size:18});
    const cellRun=(t,opts={})=>new TR({text:t,font:"Arial",size:18,...opts});

    // Column widths (DXA) — total 9360 (US Letter with 1" margins)
    const colW=[600,1400,900,1600,1200,3660];

    const headerRow=new TblRow({children:["#","Timecode","Duration","Template","Type","Content"].map((h,i)=>
      new TblCell({borders,width:{size:colW[i],type:WT.DXA},shading:hdrShade,margins:cellMar,
        children:[new Para({alignment:AT.LEFT,children:[hdrRun(h)]})]})
    )});

    const gfx=selectedGfx.length?selectedGfx:graphics;
    const dataRows=gfx.map((g,i)=>{
      const meta=TMPL[g.template]||{label:g.template,type:"?"};
      const effectiveType=g.typeOverride||meta.type||"fullscreen";
      const contentStr=Object.entries(g.content||{}).map(([k,v])=>Array.isArray(v)?`${k}: ${v.join(", ")}`:`${k}: ${v}`).join(" | ");
      const vals=[`${i+1}`,g.timestamp||"—",`${g.duration||4}s`,meta.label,effectiveType.toUpperCase(),contentStr];
      const altShade=i%2===0?{fill:"F5F0EB",type:ST.CLEAR}:undefined;
      return new TblRow({children:vals.map((v,ci)=>
        new TblCell({borders,width:{size:colW[ci],type:WT.DXA},shading:altShade,margins:cellMar,
          children:[new Para({children:[cellRun(v)]})]})
      )});
    });

    const doc=new Doc({
      styles:{default:{document:{run:{font:"Arial",size:20}}}},
      sections:[{
        properties:{page:{size:{width:12240,height:15840},margin:{top:1440,right:1440,bottom:1440,left:1440}}},
        children:[
          new Para({heading:HL.HEADING_1,spacing:{after:120},children:[new TR({text:project.name||"Graphics Cue Sheet",bold:true,font:"Arial",size:36,color:"1B4965"})]}),
          new Para({spacing:{after:300},children:[cellRun(`Exported ${new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}  •  ${gfx.length} graphics`,{color:"666666",size:18})]}),
          new Tbl({width:{size:9360,type:WT.DXA},columnWidths:colW,rows:[headerRow,...dataRows]}),
          new Para({spacing:{before:400},children:[cellRun(`Generated by Social Editor  •  aledparry.com`,{color:"999999",size:16,italics:true})]}),
        ]
      }]
    });
    const buf=await Pk.toBlob(doc);
    dl(buf,`${(project.name||"cue-sheet").replace(/\s+/g,"_")}_cue_sheet.docx`);
  };

  // Helper: download blob, optionally converting WebM→MOV first
  const dlBlob=async(blob,name)=>{
    if(convertMov&&name.endsWith(".webm")){
      const movName=name.replace(/\.webm$/,".mov");
      setPhase(p=>`Converting to MOV: ${movName.split("/").pop()}…`);
      try{
        if(!_ffmpeg||!_ffmpeg.loaded){setFfmpegLoading(true);await getFFmpeg();setFfmpegLoading(false);}
        const movBlob=await webmToMov(blob,movName);
        dl(movBlob,movName);
        return;
      }catch(e){console.warn("MOV conversion failed, falling back to WebM:",e);}
    }
    dl(blob,name);
  };

  const runExport=async()=>{
    setMode("running");
    try{
    const pn=project.name.replace(/\s+/g,"_");
    // Merge title card override into brand for export
    const exportBrand=project.titleCardOverride?{...brand,...project.titleCardOverride}:brand;
    // total steps: gfx (PNGs and/or WebMs) + captions per ratio
    const capSteps = includeCaptions ? (captionMode==="composite" ? 1 : subtitles.length) : 0;
    const gfxSteps = gfxMode==="both" ? selectedGfx.length*2 : selectedGfx.length;
    let totalSteps=Math.max(1,(gfxSteps+capSteps)*selectedRatios.length);
    setProg({done:0,total:totalSteps,pct:0});
    let done=0;
    const tick=(d,pct)=>{done=d;setProg({done,total:totalSteps,pct:pct??done/totalSteps});};

    for(const ratio of selectedRatios){
      const prefix=`${ratio.replace(":","x")}_`;
      // Helper: export a brand asset (title card / endboard) as still PNG
      const exportAssetPNG=async(drawFn,name)=>{
        const c=document.createElement("canvas");
        drawFn(c,exportBrand,ratio,1);
        const bc=addBleed(c,10);
        await new Promise(res=>{bc.toBlob(blob=>{if(blob)dl(blob,`${pn}_${prefix}${name}.png`);res();},"image/png");});
        await new Promise(r=>setTimeout(r,200));
      };
      // Graphics PNGs (title_card + endboard are now regular graphics in the array)
      if(gfxMode==="png"||gfxMode==="both"){
        setPhase(`${ratio} — exporting PNGs…`);
        for(let i=0;i<selectedGfx.length;i++){
          setPhase(`${ratio} — PNG ${i+1}/${selectedGfx.length}…`);
          drawGraphic(cvs.current,selectedGfx[i],exportBrand,ratio,1);
          const bleedCvs=addBleed(cvs.current,10);
          await new Promise(res=>{
            bleedCvs.toBlob(blob=>{
              if(blob) dl(blob,`${pn}_${prefix}${String(i+1).padStart(2,"0")}_${(selectedGfx[i].label||selectedGfx[i].template).replace(/[^a-z0-9_-]/gi,"_")}.png`);
              res();
            },"image/png");
          });
          tick(done+1);
          await new Promise(r=>setTimeout(r,500)); // 500ms gap so Chrome doesn't throttle
        }
        // Also download the XML + Premiere script
        const gfxXml=generateGraphicsXML(selectedGfx,ratio,prefix,project.name);
        dlText(gfxXml,`${pn}_${prefix}graphics_sequence.xml`);
        await new Promise(r=>setTimeout(r,500));
        const script=generatePremiereScript(selectedGfx,ratio,prefix,project.name);
        dlText(script,`${pn}_${prefix}PREMIERE_IMPORT_SCRIPT.jsx`);
      }
      // PNG Sequences (for Premiere Pro)
      if(gfxMode==="premiere"||gfxMode==="pngseq"){
        const zip=new JSZip();
        const rp=ratio.replace(":","x");

        // STEP 1: Stills at root level FIRST (XML references these, always needed)
        setPhase(`${ratio} — rendering stills…`);
        await document.fonts.ready;
        for(let i=0;i<selectedGfx.length;i++){
          const gLabel=selectedGfx[i].label||selectedGfx[i].template;
          const stillName=`${pn}_${prefix}${String(i+1).padStart(2,"0")}_${(gLabel).replace(/[^a-z0-9_-]/gi,"_")}.png`;
          const c=document.createElement("canvas");
          drawGraphic(c,selectedGfx[i],exportBrand,ratio,1);
          const bc=addBleed(c,10);
          const blob=await new Promise(r=>bc.toBlob(r,"image/png"));
          zip.file(stillName,blob);
          setPhase(`${ratio} — still ${i+1}/${selectedGfx.length}…`);
        }

        // STEP 2: XML + script (add now so zip has them even if sequences fail)
        const gfxXml=generateGraphicsXML(selectedGfx,ratio,prefix,project.name);
        zip.file(`${pn}_${prefix}graphics_sequence.xml`,gfxXml);
        const script=generatePremiereScript(selectedGfx,ratio,prefix,project.name);
        zip.file(`${pn}_${prefix}PREMIERE_IMPORT_SCRIPT.jsx`,script);

        // STEP 3: PNG sequences (can crash on large exports — stills + XML already safe)
        setPhase(`${ratio} — rendering sequences…`);
        // Process in batches of 5 to avoid memory exhaustion
        const BATCH=5;
        for(let b=0;b<selectedGfx.length;b+=BATCH){
          const batch=selectedGfx.slice(b,b+BATCH);
          setPhase(`${ratio} — batch ${Math.floor(b/BATCH)+1}/${Math.ceil(selectedGfx.length/BATCH)}…`);
          for(let j=0;j<batch.length;j++){
            const i=b+j;
            const gLabel=batch[j].label||batch[j].template;
            const folderName=`${pn}_${rp}_${String(i+1).padStart(2,"0")}_${gLabel}`;
            const folder=zip.folder(folderName);
            setPhase(`${ratio} — ${gLabel} (${i+1}/${selectedGfx.length})…`);
            try{
              const frames=await recordPNGSequence(batch[j],exportBrand,ratio,frac=>{
                setPhase(`${ratio} — ${gLabel} frame ${Math.round(frac*100)}%…`);
              });
              for(const f of frames) folder.file(f.name,f.blob);
            }catch(e){
              console.error("PNG seq failed for",gLabel,e);
              setPhase(`${ratio} — ${gLabel} FAILED: ${e.message}`);
              await new Promise(r=>setTimeout(r,500));
            }
            tick(done+1);
          }
          // Yield to browser between batches — allows GC to reclaim memory
          await new Promise(r=>setTimeout(r,200));
        }
        // Stills + XML + script already added in STEP 1 + 2 above
        setPhase(`${ratio} — zipping…`);
        const zipBlob=await zip.generateAsync({type:"blob",compression:"STORE"},meta=>{
          setProg(p=>({...p,pct:meta.percent/100}));
        });
        dl(zipBlob,`${pn}_${prefix}premiere_ready.zip`);
      }
      // Graphics WebMs
      if(gfxMode==="webm"||gfxMode==="both"){
        setPhase(`${ratio} — exporting graphic WebMs…`);
        for(let i=0;i<selectedGfx.length;i++){
          try{
            const blob=await recordGraphic(selectedGfx[i],brand,ratio);
            await dlBlob(blob,`${pn}_${prefix}${String(i+1).padStart(2,"0")}_${selectedGfx[i].label||selectedGfx[i].template}_animated.webm`);
          }catch(e){console.error("WebM export failed for graphic",i,e);}
          tick(done+1);
          await new Promise(r=>setTimeout(r,200));
        }
      }
      // Composite video — one transparent WebM with all graphics timed
      if(gfxMode==="composite"){
        setPhase(`${ratio} — rendering composite video (all graphics)…`);
        const compositeBlob=await recordCompositeVideo(selectedGfx,exportBrand,ratio,pct=>{
          setProg(p=>({...p,pct:(done/totalSteps)+(pct/totalSteps)}));
        });
        await dlBlob(compositeBlob,`${pn}_${prefix}all_graphics_composite.webm`);
        tick(done+1);
      }
      // Premiere XML — only download separately for non-premiere modes (premiere mode has it in the zip)
      if(gfxMode!=="premiere"&&gfxMode!=="pngseq"&&(gfxMode==="composite"||gfxMode==="webm"||gfxMode==="both")){
        const gfxXml=generateGraphicsXML(selectedGfx,ratio,prefix,project.name);
        dlText(gfxXml,`${pn}_${prefix}graphics_sequence.xml`);
      }
      // Captions (only if opted in)
      if(includeCaptions&&captionMode==="composite"){
        setPhase(`${ratio} — rendering composite caption video…`);
        const blob=await recordCompositeCaption(subtitles,brand,captionStyle,ratio,pct=>{
          setProg(p=>({...p,pct:(done/totalSteps)+(pct/totalSteps)}));
        });
        await dlBlob(blob,`${prefix}${pn}_captions_composite.webm`);
        tick(done+1);
        // Also export Premiere XML so editor knows clip is one file starting at 00:00
        const xml=generatePremiereXML(subtitles,ratio,prefix);
        dlText(xml,`${prefix}${pn}_captions_sequence.xml`);
      } else if(includeCaptions){
        setPhase(`${ratio} — rendering individual caption WebMs…`);
        for(let i=0;i<subtitles.length;i++){
          const blob=await recordCaption(subtitles[i],brand,captionStyle,ratio);
          await dlBlob(blob,`${prefix}caption_${String(subtitles[i].index).padStart(3,"0")}.webm`);
          tick(done+1);
          await new Promise(r=>setTimeout(r,150));
        }
        const xml=generatePremiereXML(subtitles,ratio,prefix);
        dlText(xml,`${prefix}${pn}_captions_sequence.xml`);
      }
      // Graphics cue sheet
      const gfxCues=["Filename\tTimestamp\tDuration(s)\tType\tTemplate",
        ...selectedGfx.map((g,i)=>`${prefix}${String(i+1).padStart(2,"0")}_${g.label||g.template}.png\t${g.timestamp}\t${g.duration}\t${g.type}\t${g.template}`)
      ].join("\n");
      dlText(gfxCues,`${prefix}${pn}_graphics_cues.txt`);
    }
    setMode("done");setPhase("");
    }catch(err){setPhase("Export error: "+err.message);console.error(err);}
  };

  const sm=btn();
  const ratioBtn=(k,active)=>({flex:1,background:active?"rgba(42,157,143,0.18)":"rgba(255,255,255,0.04)",border:`1px solid ${active?"#2A9D8F":"rgba(255,255,255,0.1)"}`,borderRadius:10,padding:"14px 8px",cursor:"pointer",textAlign:"center",color:"#fff",fontFamily:"inherit",transition:"all 0.15s"});

  if(mode==="done")return(
    <div style={{textAlign:"center",padding:"40px 0"}}>
      <div style={{fontSize:52,marginBottom:14}}>🎬</div>
      <div style={{fontSize:22,fontWeight:900,marginBottom:8}}>Export complete!</div>
      <div style={{opacity:0.55,fontSize:13,maxWidth:460,margin:"0 auto 24px",lineHeight:1.6}}>
        For each ratio: graphic PNGs, {captionMode==="composite"?"a composite caption WebM (drop on V4 — done!)":"individual caption WebMs + Premiere XML"}, and a graphics cue sheet.
      </div>
      <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"18px 22px",textAlign:"left",marginBottom:22,maxWidth:520,margin:"0 auto 22px"}}>
        <div style={{fontWeight:800,fontSize:12,marginBottom:12}}>📋 PREMIERE WORKFLOW</div>
        {["Create a sequence per ratio (e.g. 1920×1080 for 16:9)","Import the XML for that ratio — it places all caption clips automatically","Import graphic PNGs and use the cue sheet for timecodes","Fullscreen graphics → V2   Overlays → V3   Captions → V4","Transparency is preserved in all WebMs — no matte needed"].map((t,i)=>(
          <div key={i} style={{display:"flex",gap:10,marginBottom:8,fontSize:13,opacity:0.82}}><span style={{color:"#2A9D8F",fontWeight:800,flexShrink:0}}>{i+1}.</span>{t}</div>
        ))}
      </div>
      <button style={{...sm,padding:"12px 28px"}} onClick={()=>setMode("idle")}>← Export Again</button>
    </div>
  );

  if(mode==="running")return(
    <div style={{textAlign:"center",padding:"50px 0"}}>
      <div style={{fontSize:46,marginBottom:14}}>🎞</div>
      <div style={{fontSize:20,fontWeight:900,marginBottom:8}}>Exporting…</div>
      <div style={{opacity:0.6,fontSize:13,marginBottom:16}}>{phase}</div>
      <div style={{width:380,height:6,background:"rgba(255,255,255,0.1)",borderRadius:3,margin:"0 auto 8px",overflow:"hidden"}}>
        <div style={{width:`${Math.round((prog.pct||0)*100)}%`,height:"100%",background:brand.colorAccent,borderRadius:3,transition:"width 0.3s"}}/>
      </div>
      <div style={{fontSize:11,opacity:0.4}}>{prog.done} / {prog.total} files</div>
    </div>
  );

  return(
    <div>
      {/* Quick Export — one-click with current settings */}
      {selectedGfx.length>0&&(
        <div style={{marginBottom:DS.xl,display:"flex",gap:DS.md,alignItems:"stretch"}}>
          <button onClick={runExport} style={{flex:1,background:`linear-gradient(135deg,${brand.colorPrimary||"#1a5c5e"},${brand.colorForest||"#4a6741"})`,border:"none",borderRadius:DS.rLg,padding:`${DS.xl}px`,cursor:"pointer",color:"#fff",fontFamily:"inherit",transition:"all 0.2s",textAlign:"left"}}>
            <div style={{fontSize:22,fontWeight:900,marginBottom:4}}>⚡ Quick Export</div>
            <div style={{fontSize:12,opacity:0.8}}>{selectedGfx.length} graphics · {selectedRatios.join(" · ")} · {gfxMode==="premiere"?"Premiere Ready":gfxMode}</div>
          </button>
          <div style={{background:DS.bgCard,border:`1px solid ${DS.borderSubtle}`,borderRadius:DS.rLg,padding:`${DS.md}px ${DS.lg}px`,display:"flex",flexDirection:"column",justifyContent:"center",minWidth:140}}>
            <div style={{fontSize:10,textTransform:"uppercase",fontWeight:700,color:DS.textMuted,marginBottom:4}}>Format</div>
            <div style={{fontSize:13,fontWeight:700}}>{gfxMode==="premiere"?"Premiere Ready":gfxMode==="png"?"PNG Stills":gfxMode==="webm"?"WebM":gfxMode==="pngseq"?"PNG Seq":gfxMode==="composite"?"Composite":"Everything"}</div>
          </div>
        </div>
      )}

      {/* Graphics export mode */}
      {selectedGfx.length>0&&(
        <div style={{marginBottom:DS.lg+2}}>
          <div style={sectionHead()}>GRAPHICS EXPORT FORMAT</div>
          <div style={{display:"flex",gap:DS.sm}}>
            {[["premiere","🎬 Premiere Ready (Recommended)","PNG sequences + XML timecodes"],["png","🖼 Stills (PNG)","Static images for review"],["webm","🎞 Animated (WebM)","Individual transparent videos"],["pngseq","🎬 PNG Sequence","Numbered frames in zip"],["composite","🎥 Composite Video","One video, all graphics timed"],["both","📦 Everything","Stills + WebMs + sequences"]].map(([mode,title,desc])=>(
              <button key={mode} style={{flex:1,background:gfxMode===mode?DS.positive:DS.bgCard,border:`1px solid ${gfxMode===mode?DS.positiveBorder:DS.borderSubtle}`,borderRadius:DS.rMd,padding:`${DS.md}px`,cursor:"pointer",color:DS.textPrimary,fontFamily:"inherit",transition:"all 0.15s",textAlign:"center"}} onClick={()=>setGfxMode(mode)}>
                <div style={{fontWeight:800,fontSize:DS.fsMd,marginBottom:3}}>{title}</div>
                <div style={{fontSize:11,color:DS.textMuted,lineHeight:1.4}}>{desc}</div>
              </button>
            ))}
          </div>
          {/* MOV conversion toggle — only show for webm/both/composite modes */}
          {(gfxMode==="webm"||gfxMode==="both"||gfxMode==="composite")&&(
            <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"10px 0",marginTop:DS.xs}} onClick={()=>setConvertMov(v=>!v)}>
              <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${convertMov?"#FB8770":"rgba(255,255,255,0.18)"}`,background:convertMov?"#FB8770":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>{convertMov&&"✓"}</div>
              <span style={{fontWeight:700,fontSize:13}}>Convert to MOV</span>
              <span style={{fontSize:11,opacity:0.45}}>Premiere-native format with transparency (PNG codec). First use downloads ~31MB engine.</span>
            </div>
          )}
        </div>
      )}

      {/* Caption export — opt-in checkbox */}
      {subtitles.length>0&&(
        <div style={{marginBottom:DS.lg+2}}>
          <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"10px 0"}} onClick={()=>setIncludeCaptions(v=>!v)}>
            <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${includeCaptions?brand.colorPositive||"#2A9D8F":"rgba(255,255,255,0.18)"}`,background:includeCaptions?brand.colorPositive||"#2A9D8F":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>{includeCaptions&&"✓"}</div>
            <span style={{fontWeight:700,fontSize:13}}>Include Captions</span>
            <span style={{fontSize:11,opacity:0.45}}>{subtitles.length} lines</span>
          </div>
          {includeCaptions&&(
            <div style={{display:"flex",gap:8,marginTop:4}}>
              <button style={{flex:1,background:captionMode==="composite"?"rgba(42,157,143,0.2)":"rgba(255,255,255,0.05)",border:`1px solid ${captionMode==="composite"?"#2A9D8F":"rgba(255,255,255,0.1)"}`,borderRadius:10,padding:"12px",cursor:"pointer",color:"#fff",fontFamily:"inherit",transition:"all 0.15s",textAlign:"center"}} onClick={()=>setCaptionMode("composite")}>
                <div style={{fontWeight:800,fontSize:13,marginBottom:3}}>⬛ Composite WebM</div>
                <div style={{fontSize:11,opacity:0.55,lineHeight:1.4}}>One transparent video. Drop on V4, done.</div>
              </button>
              <button style={{flex:1,background:captionMode==="individual"?"rgba(42,157,143,0.2)":"rgba(255,255,255,0.05)",border:`1px solid ${captionMode==="individual"?"#2A9D8F":"rgba(255,255,255,0.1)"}`,borderRadius:10,padding:"12px",cursor:"pointer",color:"#fff",fontFamily:"inherit",transition:"all 0.15s",textAlign:"center"}} onClick={()=>setCaptionMode("individual")}>
                <div style={{fontWeight:800,fontSize:13,marginBottom:3}}>📄 Individual WebMs</div>
                <div style={{fontSize:11,opacity:0.55,lineHeight:1.4}}>{subtitles.length} separate files + Premiere XML.</div>
              </button>
            </div>
          )}
        </div>
      )}

      {/* Ratio selector */}
      <div style={{marginBottom:DS.lg+2}}>
        <div style={sectionHead()}>EXPORT RATIOS — tick all you need</div>
        <div style={{display:"flex",gap:8}}>
          {Object.entries(RATIOS).map(([k,v])=>(
            <button key={k} style={ratioBtn(k,ratios[k])} onClick={()=>setRatios(r=>({...r,[k]:!r[k]}))}>
              <div style={{fontSize:18,marginBottom:4}}>{ratios[k]?"☑":"☐"}</div>
              <div style={{fontWeight:800,fontSize:14,marginBottom:2}}>{k}</div>
              <div style={{fontSize:10,opacity:0.55}}>{v.hint}</div>
              <div style={{fontSize:10,opacity:0.35,marginTop:2}}>{v.W}×{v.H}</div>
            </button>
          ))}
        </div>
      </div>

      {/* Preview ratio switcher */}
      <div style={{marginBottom:18}}>
        <div style={{fontSize:10,fontWeight:700,opacity:0.5,letterSpacing:1,marginBottom:8}}>PREVIEW RATIO</div>
        <div style={{display:"flex",gap:6}}>
          {Object.keys(RATIOS).map(k=>(
            <button key={k} style={{...sm,background:previewRatio===k?"rgba(42,157,143,0.2)":"rgba(255,255,255,0.07)",border:`1px solid ${previewRatio===k?"#2A9D8F":"rgba(255,255,255,0.13)"}`}} onClick={()=>setPreviewRatio(k)}>{k}</button>
          ))}
        </div>
      </div>

      {/* Summary */}
      <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"14px 18px",marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:700,opacity:0.5,letterSpacing:1,marginBottom:10}}>WHAT WILL BE EXPORTED</div>
        {selectedRatios.length===0
          ?<div style={{opacity:0.4,fontSize:13}}>Select at least one ratio above.</div>
          :selectedRatios.map(r=>(
            <div key={r} style={{marginBottom:8}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:3,color:"#2A9D8F"}}>{r} — {RATIOS[r].W}×{RATIOS[r].H}</div>
              <div style={{fontSize:12,opacity:0.6,display:"flex",gap:16,flexWrap:"wrap"}}>
                <span>1 title card</span>
                <span>{selectedGfx.length} graphic{selectedGfx.length!==1?"s":""}{gfxMode==="premiere"?" (Premiere Ready)":gfxMode==="png"?" (PNG)":gfxMode==="webm"?" (WebM)":gfxMode==="pngseq"?" (PNG sequence)":gfxMode==="composite"?" (Composite)":gfxMode==="both"?" (Everything)":""}</span>
                <span>1 endboard</span>
                {includeCaptions&&<span>{captionMode==="composite"?"1 caption WebM":`${subtitles.length} caption WebMs`}</span>}
                <span>1 Premiere XML sequence</span>
                <span>1 graphics cue sheet</span>
              </div>
            </div>
          ))
        }
      </div>

      {/* Quick actions */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <button style={{flex:1,background:"rgba(27,73,101,0.15)",border:"1px solid rgba(27,73,101,0.3)",borderRadius:10,padding:"11px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s"}}
          onClick={exportCueSheet} title="Download a Word doc with all timecodes and content">
          📋 Cue Sheet (.docx)
        </button>
        <button style={{flex:1,background:"rgba(42,157,143,0.15)",border:"1px solid rgba(42,157,143,0.3)",borderRadius:10,padding:"11px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s"}}
          onClick={()=>{setMode("confirming");}} title="Quick export with current settings">
          ⚡ Quick Export
        </button>
      </div>

      {mode==="confirming"
        ?(
          <div style={{background:"rgba(230,57,70,0.1)",border:"1px solid rgba(230,57,70,0.3)",borderRadius:11,padding:"14px 18px",marginBottom:8}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>Ready? Your browser will download multiple files.</div>
            <div style={{fontSize:12,opacity:0.6,marginBottom:12}}>Make sure pop-up blocking is off for this page.</div>
            <div style={{display:"flex",gap:8}}>
              <button style={{...sm,background:brand.colorAccent,border:`1px solid ${brand.colorAccent}`,padding:"10px 22px",fontSize:13}} onClick={runExport}>🚀 Start Export</button>
              <button style={sm} onClick={()=>setMode("idle")}>Cancel</button>
            </div>
          </div>
        ):(
          <button disabled={selectedRatios.length===0||(!selectedGfx.length&&!subtitles.length)}
            style={{width:"100%",background:selectedRatios.length>0?"#E63946":"rgba(255,255,255,0.07)",border:"none",borderRadius:12,padding:"15px",color:"#fff",fontSize:16,fontWeight:700,cursor:selectedRatios.length>0?"pointer":"not-allowed",fontFamily:"inherit",opacity:selectedRatios.length>0?1:0.4}}
            onClick={()=>setMode("confirming")}>
            ⬇ Export {selectedRatios.length} Ratio{selectedRatios.length!==1?"s":" — "}{selectedRatios.join(" · ")}
          </button>
        )
      }
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  TITLE CARD PANEL  — per-project override of brand title card
// ═══════════════════════════════════════════════════════════════
function TitleCardPanel({project, brand, updateProject}){
  const [open, setOpen] = useState(false);
  const [previewRatio, setPreviewRatio] = useState("16:9");
  const [showAnim, setShowAnim] = useState(false);
  const [exporting, setExporting] = useState(false);
  const cvs = useRef(document.createElement("canvas"));
  const override = project.titleCardOverride;
  const isOverriding = override !== null;

  // Merged brand: brand defaults + project overrides
  const effectiveBrand = isOverriding ? {...brand, ...override} : brand;

  const setField = k => v => updateProject(prev=>({titleCardOverride: {...(prev.titleCardOverride||{}), [k]:v}}));
  const enableOverride = () => updateProject(prev=>({titleCardOverride:{
    titleCardTitle: brand.titleCardTitle||prev.name||"",
    titleCardSeriesName: brand.titleCardSeriesName||"",
    titleCardSubtitle: brand.titleCardSubtitle||"",
    titleCardStyle: brand.titleCardStyle||"bar",
  }}));
  const disableOverride = () => updateProject({titleCardOverride:null});

  const exportPNGs = () => {
    Object.keys(RATIOS).forEach(ratio=>{
      drawTitleCard(cvs.current, effectiveBrand, ratio, 1);
      cvs.current.toBlob(blob=>{
        if(!blob)return;
        const a=document.createElement("a");a.href=URL.createObjectURL(blob);
        a.download=`title_card_${project.name.replace(/\s+/g,"_")}_${ratio.replace(":","x")}.png`;a.click();
      },"image/png");
    });
  };

  const exportWebM = async () => {
    setExporting(true);
    try{
      const blob=await recordTitleCard(effectiveBrand,previewRatio);
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);
      a.download=`title_card_${project.name.replace(/\s+/g,"_")}_${previewRatio.replace(":","x")}_animated.webm`;a.click();
    }catch(e){alert("Export failed: "+e.message);}
    setExporting(false);
  };

  const S={
    sm:btn({padding:"6px 12px",fontSize:11}),
    inp:inputS(),
    lbl:label(),
  };

  return(
    <div style={card({padding:0,overflow:"hidden",borderRadius:DS.rMd})}>
      {/* Header row */}
      <div style={{display:"flex",alignItems:"center",gap:DS.md,padding:`${DS.md-1}px ${DS.lg}px`,cursor:"pointer"}} onClick={()=>setOpen(o=>!o)}>
        <span style={{fontSize:14}}>🎬</span>
        <span style={{fontWeight:700,fontSize:DS.fsMd,flex:1}}>Title Card</span>
        {isOverriding
          ?<span style={{fontSize:DS.fsXs,fontWeight:700,color:brand.colorAccent,background:DS.danger,border:`1px solid ${DS.dangerBorder}`,borderRadius:DS.xs,padding:"2px 7px"}}>EPISODE OVERRIDE</span>
          :<span style={{fontSize:DS.fsXs,color:DS.textMuted,fontWeight:600}}>Using brand defaults</span>
        }
        <span style={{opacity:0.4,fontSize:12}}>{open?"▲":"▼"}</span>
      </div>

      {open&&(
        <div style={{padding:"0 16px 16px"}}>
          {/* Toolbar */}
          <div style={{display:"flex",gap:DS.sm,marginBottom:DS.lg,flexWrap:"wrap",alignItems:"center"}}>
            <button style={btnPositive({padding:"6px 12px",fontSize:11})}
              onClick={isOverriding?disableOverride:enableOverride}>
              {isOverriding?"↺ Reset to defaults":"✏ Override for episode"}
            </button>
            <div style={{display:"flex",gap:DS.xs}}>
              {Object.keys(RATIOS).map(k=>(
                <button key={k} style={btn({background:previewRatio===k?DS.borderActive:DS.bgButton,fontSize:10,padding:"5px 9px",fontWeight:previewRatio===k?700:500})} onClick={()=>setPreviewRatio(k)}>{k}</button>
              ))}
            </div>
            <div style={{flex:1}}/>
            <button style={btn({fontSize:11})} onClick={()=>setShowAnim(a=>!a)} title={showAnim?"Stop animation":"Play animation"}>{showAnim?"⏹ Stop":"▶ Play"}</button>
            <button style={btn({fontSize:11,opacity:exporting?0.6:1})} onClick={()=>!exporting&&exportWebM()} title="Export animated WebM">{exporting?"⏳":"🎞"} WebM</button>
            <button style={btnPositive({fontSize:11})} onClick={exportPNGs} title="Export still PNGs for all ratios">⬇ PNGs</button>
          </div>

          {/* Live preview */}
          {showAnim
            ?<TitleCardAnimPreview brand={effectiveBrand} ratio={previewRatio} width={480}/>
            :<StaticCanvasPreview
              drawFn={drawTitleCard} brand={effectiveBrand} ratio={previewRatio} width={480}
              deps={[effectiveBrand.titleCardTitle,effectiveBrand.titleCardSeriesName,effectiveBrand.titleCardSubtitle,effectiveBrand.titleCardStyle,effectiveBrand.colorPrimary,effectiveBrand.colorAccent,effectiveBrand.fontFamily,effectiveBrand.logoDataUrl,previewRatio]}
            />
          }

          {/* Override fields — only shown when overriding */}
          {isOverriding&&(
            <div style={{marginTop:14,display:"grid",gap:10}}>
              <div style={{display:"flex",gap:8,marginBottom:4}}>
                {[["bar","▌ Bar"],["centred","◎ Centred"],["split","▬ Split"]].map(([k,l])=>(
                  <button key={k} style={{...S.sm,fontSize:11,background:(override.titleCardStyle||"bar")===k?brand.colorPositive:"rgba(255,255,255,0.07)",border:`1px solid ${(override.titleCardStyle||"bar")===k?brand.colorPositive:"rgba(255,255,255,0.12)"}`}} onClick={()=>setField("titleCardStyle")(k)}>{l}</button>
                ))}
              </div>
              <div>
                <label style={S.lbl}>SERIES NAME</label>
                <input value={override.titleCardSeriesName||""} onChange={e=>setField("titleCardSeriesName")(e.target.value)} placeholder={brand.titleCardSeriesName||"e.g. Wales Housing Law"} style={S.inp}/>
              </div>
              <div>
                <label style={S.lbl}>EPISODE TITLE</label>
                <input value={override.titleCardTitle||""} onChange={e=>setField("titleCardTitle")(e.target.value)} placeholder={brand.titleCardTitle||"e.g. Rent Increase Rules"} style={S.inp}/>
              </div>
              <div>
                <label style={S.lbl}>SUBTITLE / EPISODE NUMBER</label>
                <input value={override.titleCardSubtitle||""} onChange={e=>setField("titleCardSubtitle")(e.target.value)} placeholder={brand.titleCardSubtitle||"e.g. Episode 1"} style={S.inp}/>
              </div>
            </div>
          )}
          {!isOverriding&&(
            <div style={{marginTop:10,fontSize:12,opacity:0.4,fontStyle:"italic"}}>
              Showing brand defaults. Click "Override for this episode" to customise for {project.name}.
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  PROJECT VIEW
// ═══════════════════════════════════════════════════════════════
function ProjectView({project,brand,updateProject,onBack,allBrands,onChangeBrand}){
  const [tab,setTab]=useState("graphics");
  const [previewRatio,setPreviewRatio]=useState("16:9");
  const fileRef=useRef();
  // Clear stale blob URLs on mount (blob URLs don't survive page refresh)
  useEffect(()=>{if(project.videoUrl&&project.videoUrl.startsWith("blob:"))updateProject({videoUrl:null,videoName:null});},[]);// eslint-disable-line

  const [transcribing,setTranscribing]=useState(false);
  const [transcribeError,setTranscribeError]=useState("");

  const handleSRT=f=>{
    const r=new FileReader();
    r.onload=e=>{ const subs=parseSRT(e.target.result); updateProject({srt:e.target.result,subtitles:subs,graphics:[],selected:[],previews:{}}); };
    r.readAsText(f);
  };

  const handleVideo=async(f)=>{
    setTranscribing(true);setTranscribeError("");
    // Store video blob URL for live preview
    const videoUrl=URL.createObjectURL(f);
    updateProject({videoUrl,videoName:f.name});
    try{
      const form=new FormData();form.append("file",f);
      const res=await fetch(API_BASE+"/api/transcribe",{method:"POST",body:form});
      const data=await res.json();
      if(!res.ok) throw new Error(data.error||"Transcription failed");
      const subs=parseSRT(data.srt);
      updateProject({srt:data.srt,subtitles:subs,graphics:[],selected:[],previews:{},videoUrl,videoName:f.name});
    }catch(e){setTranscribeError(e.message);}
    finally{setTranscribing(false);}
  };

  const handleFile=f=>{
    if(!f) return;
    const ext=f.name.split(".").pop().toLowerCase();
    if(["srt","txt"].includes(ext)) handleSRT(f);
    else if(["mp4","mov","m4a","mp3","wav","webm","ogg"].includes(ext)){
      // If SRT already loaded, just attach video for preview (don't re-transcribe)
      if(hasSRT&&["mp4","mov","webm"].includes(ext)){
        const videoUrl=URL.createObjectURL(f);
        updateProject({videoUrl,videoName:f.name});
      } else {
        handleVideo(f);
      }
    }
    else setTranscribeError("Unsupported file type. Upload .srt, .mp4, .mov, .mp3, or .wav");
  };

  const hasSRT=project.subtitles.length>0;
  const S={
    app:{fontFamily:`"${brand.fontFamily}","Arial",sans-serif`,background:DS.bgPage,minHeight:"100vh",color:DS.textPrimary},
    topbar:{background:"linear-gradient(135deg, #0d1926 0%, #132438 100%)",padding:`${DS.md}px ${DS.xl}px`,display:"flex",alignItems:"center",gap:DS.md,borderBottom:"none"},
    tabbar:{background:"rgba(13,25,38,0.85)",backdropFilter:"blur(12px)",borderBottom:`1px solid ${brand.colorAccent}22`,display:"flex",padding:`0 ${DS.xl}px`,gap:0},
    tab:a=>({padding:`${DS.lg}px ${DS.xl}px`,cursor:"pointer",fontWeight:a?700:500,fontSize:DS.fsMd,color:a?DS.textPrimary:"rgba(255,255,255,0.45)",background:"none",border:"none",borderBottom:a?`3px solid ${brand.colorAccent}`:"3px solid transparent",fontFamily:"inherit",transition:"all 0.2s",letterSpacing:0.3}),
    sm:btn({padding:"6px 12px"}),
    wrap:{maxWidth:1200,margin:"0 auto",padding:`${DS.xl}px ${DS.xl}px`},
  };

  return(
    <div style={S.app}>
      {/* Top bar */}
      <div style={S.topbar}>
        <div style={{flex:1,minWidth:0,display:"flex",alignItems:"center",gap:DS.sm}}>
          <button style={btn({background:"transparent",border:"none",opacity:0.5,padding:"4px 8px",fontSize:DS.fsSm})} onClick={onBack} title="Back to home">←</button>
          {allBrands?.length>1?(
            <select value={project.brandId} onChange={e=>onChangeBrand&&onChangeBrand(Number(e.target.value))}
              style={{background:"transparent",border:"none",color:DS.textMuted,fontSize:DS.fsSm,cursor:"pointer",fontFamily:"inherit",outline:"none",padding:"2px 4px"}}>
              {(allBrands||[]).map(b=><option key={b.id} value={b.id} style={{background:DS.bgModal}}>{b.name}</option>)}
            </select>
          ):(
            <div style={{fontSize:DS.fsSm,color:DS.textMuted,cursor:"pointer"}} onClick={onBack}>{brand.name}</div>
          )}
          <span style={{color:DS.textMuted,fontSize:DS.fsXs}}>/</span>
          <div style={{fontWeight:700,fontSize:DS.fsLg,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{project.name}</div>
        </div>
        <div style={{display:"flex",gap:DS.xs,alignItems:"center",flexShrink:0}}>
          <span style={{fontSize:DS.fsXs,color:DS.textMuted,marginRight:DS.xs}}>Preview</span>
          {Object.keys(RATIOS).map(k=>(
            <button key={k} style={btn({background:previewRatio===k?DS.borderActive:DS.bgButton,fontSize:11,padding:"4px 8px",fontWeight:previewRatio===k?700:500})} onClick={()=>setPreviewRatio(k)}>{k}</button>
          ))}
        </div>
      </div>

      {/* Tab bar */}
      <div style={S.tabbar}>
        {[["graphics","🎨 Graphics"],["posters","🖼 Posters"],["export","📦 Export"]].map(([k,l])=>(
          <button key={k} style={S.tab(tab===k)} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>

      <div style={S.wrap}>
        {/* API key banner removed — server-side proxy */}
        {/* Upload bar — accepts SRT or video/audio files */}
        <div style={card({padding:`${DS.md-1}px ${DS.lg}px`,marginBottom:DS.lg+2,display:"flex",alignItems:"center",gap:DS.md,flexWrap:"wrap"})}
          onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor=brand.colorAccent;}}
          onDragLeave={e=>{e.currentTarget.style.borderColor=DS.borderSubtle;}}
          onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor=DS.borderSubtle;handleFile(e.dataTransfer.files[0]);}}>
          <span style={label({marginBottom:0,flexShrink:0})}>{transcribing?"🎙":"SRT"}</span>
          {transcribing
            ?<span style={{fontSize:DS.fsSm,color:brand.colorAccent,flex:1,fontWeight:600}}>🔄 Transcribing audio… this may take a minute</span>
            :hasSRT
              ?<><span style={{background:DS.positive,border:`1px solid ${DS.positiveBorder}`,borderRadius:5,padding:"3px 9px",fontSize:11,fontWeight:700,color:DS.green,flexShrink:0}}>✓ {project.subtitles.length} lines</span>
                <span style={{fontSize:DS.fsSm,color:DS.textMuted,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>"{project.subtitles[0]?.text}"…</span></>
              :<span style={{fontSize:DS.fsSm,color:DS.textMuted,flex:1}}>Drop SRT or video/audio file here</span>
          }
          {transcribeError&&<span style={{fontSize:11,color:DS.accent,flex:"0 0 100%",marginTop:4}}>{transcribeError}</span>}
          {!transcribing&&<button style={{...S.sm,flexShrink:0}} onClick={()=>fileRef.current.click()}>{hasSRT?"↺ Replace":"⬆ Upload"}</button>}
          <input ref={fileRef} type="file" accept=".srt,.txt,.mp4,.mov,.m4a,.mp3,.wav,.webm,.ogg" style={{display:"none"}} onChange={e=>e.target.files[0]&&handleFile(e.target.files[0])}/>
        </div>

        {/* Title card + endboard now live in the graphics timeline as regular segments */}

        {/* Tab content */}
        {tab==="posters"
          ?<PosterTab project={project} brand={brand} updateProject={updateProject}/>
          :!hasSRT
          ?<div style={{...emptyState({padding:"60px 0"}),cursor:"pointer",border:`2px dashed ${DS.borderMedium}`,borderRadius:DS.rLg,transition:"all 0.2s"}}
              onClick={()=>fileRef.current.click()}
              onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor=brand.colorAccent;e.currentTarget.style.background="rgba(230,57,70,0.05)";}}
              onDragLeave={e=>{e.currentTarget.style.borderColor=DS.borderMedium;e.currentTarget.style.background="transparent";}}
              onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor=DS.borderMedium;e.currentTarget.style.background="transparent";handleFile(e.dataTransfer.files[0]);}}>
              {transcribing
                ?<><div style={{fontSize:42,marginBottom:DS.md}}>🎙</div><div style={{fontSize:DS.fsLg,fontWeight:700}}>Transcribing audio…</div><div style={{fontSize:DS.fsSm,color:DS.textMuted,marginTop:DS.xs}}>This may take a minute depending on file length</div></>
                :<><div style={{fontSize:42,marginBottom:DS.md}}>🎬</div><div style={{fontSize:DS.fsLg,fontWeight:700}}>Drop video, audio, or SRT file here</div><div style={{fontSize:DS.fsSm,color:DS.textMuted,marginTop:DS.xs}}>Supports .mp4 .mov .mp3 .wav .srt — or click to browse</div></>
              }
            </div>
          :tab==="graphics"?<GraphicsTab project={project} brand={brand} updateProject={updateProject} previewRatio={previewRatio}/>
          :<ExportTab project={project} brand={brand} updateProject={updateProject}/>
        }
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  TITLE CARD RENDERER
// ═══════════════════════════════════════════════════════════════
function drawTitleCard(canvas, brand, ratio, progress=1){
  const AR=RATIOS[ratio||"16:9"]||RATIOS["16:9"];
  const W=AR.W,H=AR.H;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext("2d",{alpha:true});
  ctx.clearRect(0,0,W,H);
  const B={...DEFAULT_BRAND,...brand};
  const FF=B.fontFamily||"Montserrat";
  const FFS=B.fontSerif||FF;
  const CW=B.colorWarm||"#f5f0eb";
  const sc=Math.min(W,H)/1080;
  const p=clamp(progress,0,1);
  const ENT=easeOut(clamp(p*1.8,0,1));
  const TXT=easeOut(clamp((p-0.1)*2,0,1));
  const PAD=Math.round(90*sc);

  const style=B.titleCardStyle||"bar";

  // Warm cream background
  ctx.fillStyle=CW; ctx.fillRect(0,0,W,H);

  if(style==="bar"){
    // Thin accent bar on left — grows down
    const lx=PAD+Math.round(20*sc); // left x for all text
    const maxTxtW=W-PAD*2;
    const barH=H*ENT;
    ctx.fillStyle=B.colorAccent; ctx.fillRect(0,(H-barH)/2,Math.round(4*sc),barH);
    // Series name — small caps, teal
    ctx.save(); ctx.globalAlpha=TXT*0.45;
    ctx.font=`500 ${Math.round(32*sc)}px "${FF}",Arial,sans-serif`;
    ctx.fillStyle=B.colorPrimary; ctx.textAlign="left"; ctx.textBaseline="alphabetic";
    ctx.fillText((B.titleCardSeriesName||"").toUpperCase(), lx, H*0.38);
    ctx.restore();
    // Title — serif, teal
    ctx.save(); ctx.globalAlpha=TXT; ctx.translate((1-TXT)*-50*sc,0);
    drawText(ctx,B.titleCardTitle||"EPISODE TITLE",lx,H*0.44,maxTxtW,H*0.22,Math.round(110*sc),"700","left",B.colorPrimary,2,FFS);
    ctx.restore();

    // Thin divider line grows right
    ctx.strokeStyle=B.colorAccent; ctx.lineWidth=Math.round(2*sc);
    ctx.beginPath(); ctx.moveTo(lx,H*0.66); ctx.lineTo(lx+(W*0.35)*ENT,H*0.66); ctx.stroke();

    // Subtitle — below divider
    if(B.titleCardSubtitle){
      ctx.save(); ctx.globalAlpha=TXT*0.6; ctx.translate((1-TXT)*-30*sc,0);
      drawText(ctx,B.titleCardSubtitle,lx,H*0.68,maxTxtW,H*0.12,Math.round(44*sc),"400","left",B.colorPrimary+"a8",1,FF);
      ctx.restore();
    }
  }
  else if(style==="centred"){
    // Large ghost circle in teal
    ctx.save(); ctx.globalAlpha=0.04*ENT; ctx.fillStyle=B.colorPrimary;
    ctx.beginPath(); ctx.arc(W/2,H/2,Math.min(W,H)*0.42,0,Math.PI*2); ctx.fill(); ctx.restore();
    // Series name — small caps
    ctx.save(); ctx.globalAlpha=TXT*0.4;
    ctx.font=`500 ${Math.round(30*sc)}px "${FF}",Arial,sans-serif`;
    ctx.fillStyle=B.colorPrimary; ctx.textAlign="center"; ctx.textBaseline="alphabetic";
    ctx.fillText((B.titleCardSeriesName||"").toUpperCase(),W/2,H*0.36);
    ctx.restore();
    // Accent rule
    const ruleW=Math.round(60*sc)*ENT;
    ctx.fillStyle=B.colorAccent; ctx.fillRect(W/2-ruleW/2,H*0.40,ruleW,Math.round(3*sc));
    // Title — serif, teal
    ctx.save(); ctx.globalAlpha=TXT;
    drawText(ctx,B.titleCardTitle||"EPISODE TITLE",W/2,H*0.44,W-PAD*2,H*0.22,Math.round(108*sc),"700","center",B.colorPrimary,2,FFS);
    ctx.restore();
    // Subtitle
    if(B.titleCardSubtitle){
      ctx.save(); ctx.globalAlpha=TXT*0.55;
      drawText(ctx,B.titleCardSubtitle,W/2,H*0.70,W-PAD*2,H*0.10,Math.round(40*sc),"400","center",B.colorPrimary+"a8",1,FF);
      ctx.restore();
    }
  }
  else if(style==="split"){
    // Bottom half teal block slides up
    const splitY=H*(0.5+(1-ENT)*0.5);
    ctx.fillStyle=B.colorPrimary; ctx.fillRect(0,splitY,W,H-splitY);
    // Series name top half — teal on cream
    ctx.save(); ctx.globalAlpha=TXT;
    ctx.font=`500 ${Math.round(34*sc)}px "${FF}",Arial,sans-serif`;
    ctx.fillStyle=B.colorPrimary+"88"; ctx.textAlign="left"; ctx.textBaseline="alphabetic";
    ctx.fillText((B.titleCardSeriesName||"").toUpperCase(),PAD,H*0.40);
    ctx.restore();
    // Title on teal half — serif, white
    ctx.save(); ctx.globalAlpha=TXT;
    drawText(ctx,B.titleCardTitle||"EPISODE TITLE",PAD,H*0.56,W-PAD*2,H*0.26,Math.round(108*sc),"700","left","#fff",2,FFS);
    ctx.restore();
    if(B.titleCardSubtitle){
      ctx.save(); ctx.globalAlpha=TXT*0.8;
      drawText(ctx,B.titleCardSubtitle,PAD,H*0.82,W-PAD*2,H*0.10,Math.round(40*sc),"400","left","rgba(255,255,255,0.8)",1,FF);
      ctx.restore();
    }
  }

  // Logo — white on dark bg (split), teal on cream bg (bar/centred)
  stamp(ctx,B,W,H,style==="split");
}

// ═══════════════════════════════════════════════════════════════
//  ENDBOARD RENDERER
// ═══════════════════════════════════════════════════════════════
function drawEndboard(canvas, brand, ratio, progress=1){
  const AR=RATIOS[ratio||"16:9"]||RATIOS["16:9"];
  const W=AR.W,H=AR.H;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext("2d",{alpha:true});
  ctx.clearRect(0,0,W,H);
  const B={...DEFAULT_BRAND,...brand};
  const FF=B.fontFamily||"Montserrat";
  const FFS=B.fontSerif||FF;
  const CW=B.colorWarm||"#f5f0eb";
  const sc=Math.min(W,H)/1080;
  const p=clamp(progress,0,1);
  const ENT=easeOut(clamp(p*1.8,0,1));
  const TXT=easeOut(clamp((p-0.12)*2,0,1));
  const PAD=Math.round(90*sc);
  const style=B.endboardStyle||"logo";

  // Warm cream background
  ctx.fillStyle=CW; ctx.fillRect(0,0,W,H);

  if(style==="logo"){
    // Large centred logo
    const logoImg=brand.logoDataUrl?getCachedImage(brand.logoDataUrl):null;
    if(logoImg){
      const lw=Math.round(W*0.28*ENT);
      const lh=Math.round(lw*(logoImg.naturalHeight/logoImg.naturalWidth));
      ctx.save(); ctx.globalAlpha=ENT;
      ctx.drawImage(logoImg,(W-lw)/2,(H*0.28-lh/2),lw,lh);
      ctx.restore();
    } else {
      // Placeholder circle if no logo
      ctx.save(); ctx.globalAlpha=0.10*ENT; ctx.fillStyle=B.colorPrimary;
      ctx.beginPath(); ctx.arc(W/2,H*0.28,Math.round(90*sc),0,Math.PI*2); ctx.fill(); ctx.restore();
      ctx.save(); ctx.globalAlpha=0.5*ENT;
      ctx.font=`600 ${Math.round(36*sc)}px "${FFS}",Arial,sans-serif`;
      ctx.fillStyle=B.colorPrimary; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(B.channelName||"LOGO",W/2,H*0.28);
      ctx.restore();
    }
    // Divider
    const rW=Math.round(W*0.3*ENT);
    ctx.fillStyle=B.colorAccent; ctx.fillRect(W/2-rW/2,H*0.46,rW,Math.round(3*sc));
    // CTA — serif, teal
    ctx.save(); ctx.globalAlpha=TXT;
    drawText(ctx,B.endboardCTA||"Thanks for watching",W/2,H*0.50,W-PAD*2,H*0.14,Math.round(72*sc),"700","center",B.colorPrimary,2,FFS);
    ctx.restore();
    // Handles
    if(B.endboardHandles){
      ctx.save(); ctx.globalAlpha=TXT*0.6;
      drawText(ctx,B.endboardHandles,W/2,H*0.68,W-PAD*2,H*0.08,Math.round(38*sc),"500","center",B.colorAccent,1,FF);
      ctx.restore();
    }
    // Website
    if(B.endboardWebsite){
      ctx.save(); ctx.globalAlpha=TXT*0.45;
      drawText(ctx,B.endboardWebsite,W/2,H*0.76,W-PAD*2,H*0.07,Math.round(34*sc),"400","center",B.colorPrimary+"88",1,FF);
      ctx.restore();
    }
  }
  else if(style==="grid"){
    // Top bar in teal slides down
    const barH=H*0.12*ENT;
    ctx.fillStyle=B.colorPrimary; ctx.fillRect(0,0,W,barH);
    // Logo in bar
    const logoImg=brand.logoDataUrl?getCachedImage(brand.logoDataUrl):null;
    if(logoImg && ENT>0.3){
      const lh=Math.round(barH*0.6); const lw=Math.round(lh*(logoImg.naturalWidth/logoImg.naturalHeight));
      ctx.save(); ctx.globalAlpha=Math.max(0,(ENT-0.3)/0.7);
      ctx.drawImage(logoImg,PAD,(barH-lh)/2,lw,lh); ctx.restore();
    }
    // Big CTA — serif, teal
    ctx.save(); ctx.globalAlpha=TXT;
    drawText(ctx,B.endboardCTA||"Thanks for watching",W/2,H*0.22,W-PAD*2,H*0.20,Math.round(90*sc),"700","center",B.colorPrimary,2,FFS);
    ctx.restore();
    // Action boxes
    const boxW=Math.round(260*sc),boxH=Math.round(80*sc),gap=Math.round(24*sc);
    const totalW=boxW*2+gap; const bx=(W-totalW)/2; const by=H*0.52;
    ["▶  Subscribe","🔔  Notify me"].forEach((lbl,i)=>{
      const x=bx+i*(boxW+gap);
      ctx.save(); ctx.globalAlpha=TXT;
      ctx.shadowColor="rgba(0,0,0,0.15)"; ctx.shadowBlur=20;
      rrPath(ctx,x,by,boxW,boxH,Math.round(14*sc));
      ctx.fillStyle=i===0?B.colorAccent:B.colorPrimary+"22"; ctx.fill(); ctx.shadowBlur=0;
      ctx.font=`600 ${Math.round(28*sc)}px "${FF}",Arial,sans-serif`;
      ctx.fillStyle=i===0?"#fff":B.colorPrimary; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(lbl,x+boxW/2,by+boxH/2); ctx.restore();
    });
    if(B.endboardHandles){
      ctx.save(); ctx.globalAlpha=TXT*0.55;
      drawText(ctx,B.endboardHandles,W/2,H*0.75,W-PAD*2,H*0.07,Math.round(34*sc),"500","center",B.colorPrimary,1,FF);
      ctx.restore();
    }
    if(B.endboardWebsite){
      ctx.save(); ctx.globalAlpha=TXT*0.4;
      drawText(ctx,B.endboardWebsite,W/2,H*0.82,W-PAD*2,H*0.06,Math.round(30*sc),"400","center",B.colorPrimary+"88",1,FF);
      ctx.restore();
    }
  }
  else if(style==="minimal"){
    // Thin teal line at top, logo, one line of text
    ctx.fillStyle=B.colorPrimary; ctx.fillRect(0,0,W,Math.round(4*sc));
    const logoImg=brand.logoDataUrl?getCachedImage(brand.logoDataUrl):null;
    if(logoImg){
      const lw=Math.round(W*0.18*ENT); const lh=Math.round(lw*(logoImg.naturalHeight/logoImg.naturalWidth));
      ctx.save(); ctx.globalAlpha=ENT; ctx.drawImage(logoImg,(W-lw)/2,H*0.30,lw,lh); ctx.restore();
    }
    ctx.save(); ctx.globalAlpha=TXT;
    drawText(ctx,B.endboardCTA||"Thanks for watching",W/2,H*0.56,W-PAD*2,H*0.14,Math.round(64*sc),"700","center",B.colorPrimary,1,FFS);
    ctx.restore();
    if(B.endboardHandles||B.endboardWebsite){
      ctx.save(); ctx.globalAlpha=TXT*0.45;
      drawText(ctx,(B.endboardHandles||"")+(B.endboardHandles&&B.endboardWebsite?"  ·  ":"")+(B.endboardWebsite||""),W/2,H*0.66,W-PAD*2,H*0.07,Math.round(32*sc),"400","center",B.colorPrimary+"99",1,FF);
      ctx.restore();
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  STATIC CANVAS PREVIEW COMPONENT
// ═══════════════════════════════════════════════════════════════
function StaticCanvasPreview({drawFn, brand, ratio, deps=[], width=380}){
  const ref=useRef(); const rafRef=useRef(); const st=useRef(Date.now());
  useEffect(()=>{
    st.current=Date.now();
    const loop=()=>{
      const p=Math.min((Date.now()-st.current)/800,1);
      if(ref.current) drawFn(ref.current,brand,ratio,p);
      if(p<1) rafRef.current=requestAnimationFrame(loop);
    };
    document.fonts.ready.then(()=>{rafRef.current=requestAnimationFrame(loop);});
    return()=>cancelAnimationFrame(rafRef.current);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[ratio,...deps]);
  const AR=RATIOS[ratio||"16:9"]||RATIOS["16:9"]; const aspect=AR.W/AR.H;
  return(
    <div style={{position:"relative",width,height:width/aspect,borderRadius:10,overflow:"hidden",border:"1px solid rgba(255,255,255,0.1)"}}>
      <canvas ref={ref} width={AR.W} height={AR.H} style={{width:"100%",height:"100%"}}/>
    </div>
  );
}
