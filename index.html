async function callAI({system,messages,max_tokens=2500}){

    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({system,messages,max_tokens,model:"claude-sonnet-4-20250514"})

];

function loadFont(name) {
  const id = "gf-" + name.replace(/ /g, "-");
  if (document.getElementById(id)) return;
  const entry = FONTS.find(f=>f.name===name)||FONTS[0];
  const l = document.createElement("link");
  l.id = id; l.rel = "stylesheet";
  if (entry.ital) {
    // Build ital,wght axis: 0,400;0,700;1,400;1,700
    const wArr = entry.weights.split(";");
    const axes = wArr.map(w=>`0,${w}`).concat(wArr.map(w=>`1,${w}`)).join(";");
    l.href = `https://fonts.googleapis.com/css2?family=${name.replace(/ /g,"+")}:ital,wght@${axes}&display=swap`;
  } else {
    l.href = `https://fonts.googleapis.com/css2?family=${name.replace(/ /g,"+")}:wght@${entry.weights}&display=swap`;
  }
  document.head.appendChild(l);
}

//  ASPECT RATIOS
// ═══════════════════════════════════════════════════════════════
const RATIOS = {
  "16:9": { W:1920, H:1080, label:"16:9", hint:"YouTube / Premiere" },
  "1:1":  { W:1080, H:1080, label:"1:1",  hint:"Instagram Feed"     },
  "9:16": { W:1080, H:1920, label:"9:16", hint:"TikTok / Reels"     },
};

// Social media safe zones (pixels at 1080x1920 for 9:16)
// Universal safe area works across TikTok + Instagram Reels
const SAFE_ZONES = {
  "9:16": {
    universal: { top:220, bottom:420, left:60, right:120 }, // works on both platforms (paid)
    organic:   { top:150, bottom:150, left:60, right:120 }, // organic only
    tiktok:    { top:108, bottom:420, left:60, right:120 }, // TikTok-specific
    reels:     { top:150, bottom:150, left:0,  right:0   }, // Reels-specific
  },
  "1:1": {
    universal: { top:40, bottom:40, left:40, right:40 },
  },
  "16:9": {
    universal: { top:40, bottom:40, left:60, right:60 },
  },
};

// Get safe content area for a ratio (returns {x, y, w, h} in canvas pixels)
function getSafeArea(ratio, mode="universal"){
  const AR=RATIOS[ratio]||RATIOS["16:9"];
  const sz=(SAFE_ZONES[ratio]||SAFE_ZONES["16:9"])[mode]||SAFE_ZONES["16:9"].universal;
  return { x:sz.left, y:sz.top, w:AR.W-sz.left-sz.right, h:AR.H-sz.top-sz.bottom };
}

// Draw safe zone overlay on canvas (debug/preview)
function drawSafeZoneOverlay(ctx, W, H, ratio){
  const zones=SAFE_ZONES[ratio]||SAFE_ZONES["16:9"];
  const u=zones.universal||{top:40,bottom:40,left:40,right:40};
  // Dim the unsafe areas
  ctx.save();ctx.fillStyle="rgba(255,0,0,0.12)";
  ctx.fillRect(0,0,W,u.top);           // top
  ctx.fillRect(0,H-u.bottom,W,u.bottom); // bottom
  ctx.fillRect(0,u.top,u.left,H-u.top-u.bottom); // left
  ctx.fillRect(W-u.right,u.top,u.right,H-u.top-u.bottom); // right
  ctx.restore();
  // Safe area border
  ctx.save();ctx.strokeStyle="rgba(255,255,255,0.35)";ctx.lineWidth=2;ctx.setLineDash([8,6]);
  ctx.strokeRect(u.left,u.top,W-u.left-u.right,H-u.top-u.bottom);
  ctx.restore();
  // Labels
  ctx.save();ctx.font="bold 22px sans-serif";ctx.fillStyle="rgba(255,255,255,0.4)";ctx.textAlign="center";ctx.textBaseline="middle";
  if(u.top>60) ctx.fillText("⚠ UI OVERLAY",W/2,u.top/2);
  if(u.bottom>60) ctx.fillText("⚠ CAPTIONS / MUSIC",W/2,H-u.bottom/2);
  if(u.right>60) ctx.fillText("⚠",W-u.right/2,H/2);
  ctx.restore();
}

const IMG_CACHE = {};
let _imgLoadListeners=[];
function onImgLoad(fn){_imgLoadListeners.push(fn);}
function getCachedImage(src) {
  if (!src) return null;
  if (IMG_CACHE[src]) return IMG_CACHE[src].complete ? IMG_CACHE[src] : null;
  const img = new Image();
  img.crossOrigin = "anonymous";
  img.onload=()=>_imgLoadListeners.forEach(fn=>fn());

  IMG_CACHE[src] = img;
  return null;
}

// ═══════════════════════════════════════════════════════════════
//  SRT PARSER
// ═══════════════════════════════════════════════════════════════
const toSec = ts => { const [h,m,s]=ts.replace(",",".").split(":").map(Number); return h*3600+m*60+s; };
function parseSRT(srt) {
  return srt.trim().split(/\n\s*\n/).map((b,idx)=>{
    const lines=b.trim().split("\n"), tl=lines.find(l=>l.includes("-->"));
    if(!tl)return null;
    const m=tl.match(/(\d{2}:\d{2}:\d{2}[,.:]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,.:]\d{3})/);
    if(!m)return null;
    const text=lines.slice(lines.indexOf(tl)+1).join(" ").replace(/<[^>]+>/g,"").trim();
    return{index:idx+1,start:m[1],end:m[2],startSec:toSec(m[1]),endSec:toSec(m[2]),text};
  }).filter(Boolean);
}

// ═══════════════════════════════════════════════════════════════
//  PREMIERE XML GENERATOR
// ═══════════════════════════════════════════════════════════════
function generatePremiereXML(subtitles, ratio, prefix) {
  const { W, H } = RATIOS[ratio] || RATIOS["16:9"];
  const FPS = 30;
  const toF = sec => Math.round(sec * FPS);
  const lastSub = subtitles[subtitles.length - 1];
  const totalFrames = lastSub ? toF(lastSub.endSec) + FPS : FPS * 60;
  const clips = subtitles.map((s,i) => {
    const sf=toF(s.startSec), ef=toF(s.endSec), dur=ef-sf;
    const fn=`${prefix}caption_${String(s.index).padStart(3,"0")}.webm`;
    return `      <clipitem id="clip${i+1}">
        <name>${fn}</name><start>${sf}</start><end>${ef}</end>
        <in>0</in><out>${dur}</out>
        <file id="file${i+1}">
          <name>${fn}</name><pathurl>${fn}</pathurl>
          <duration>${dur}</duration>
          <rate><timebase>${FPS}</timebase><ntsc>FALSE</ntsc></rate>
          <media><video><samplecharacteristics>
            <width>${W}</width><height>${H}</height>
          </samplecharacteristics></video></media>
        </file>
      </clipitem>`;
  }).join("\n");
  return `<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE xmeml>\n<xmeml version="5">\n  <sequence id="seq1">\n    <name>Captions ${ratio}</name>\n    <duration>${totalFrames}</duration>\n    <rate><timebase>${FPS}</timebase><ntsc>FALSE</ntsc></rate>\n    <media>\n      <video>\n        <format><samplecharacteristics><width>${W}</width><height>${H}</height></samplecharacteristics></format>\n        <track>\n${clips}\n        </track>\n      </video>\n    </media>\n  </sequence>\n</xmeml>`;
}

// Generate Premiere ExtendScript (.jsx) — auto-imports PNG sequences + places on timeline
function generatePremiereScript(graphics, ratio, prefix, projectName) {
  const FPS = 25;
  const tsToSec = ts => { const p=(ts||"00:00:00").split(":").map(Number); return p[0]*3600+p[1]*60+(p[2]||0); };
  const { W, H } = RATIOS[ratio] || RATIOS["16:9"];

  const pn = (projectName||"Project").replace(/\s+/g,"_");
  // Build clip data array — folder names MUST match the download filenames
  const clips = graphics.map((g, i) => {
    const idx = i;
    const label = (g.label||g.template).replace(/[^a-z0-9_-]/gi,"_");
    const folder = `${pn}_${prefix}${String(idx+1).padStart(2,"0")}_${label}`;
    const startSec = tsToSec(g.timestamp);
    const dur = g.duration || 4;
    const isOv = (g.typeOverride||(TMPL[g.template]||{}).type) !== "fullscreen";
    return { folder, startSec, dur, isOv, label };
  });

  return `// Premiere Pro ExtendScript — run via File > Scripts > Run Script
// ============================================================
// Premiere Pro ExtendScript — Import PNG sequences + place on timeline
// Generated by Social Editor for: ${(projectName||"Project").replace(/"/g,"'")}
// Ratio: ${ratio} (${W}x${H}) @ ${FPS}fps
// ============================================================
//
// HOW TO USE:
// 1. Export "Premiere Ready" from Social Editor
// 2. Unzip the downloaded file into a folder
// 3. Open your Premiere project (or create a new one)
// 4. File > Scripts > Run Script > select this file
// 5. Pick the unzipped folder when prompted
// 6. Script imports each PNG sequence + places on V2/V3
//
// IMPORTANT: Make sure you have an active sequence open before running.
// If not, the script will create one for you.

var FPS = ${FPS};
var clips = ${JSON.stringify(clips, null, 2)};

// Premiere ticks per second (constant)
var TICKS_PER_SECOND = 254016000000;

function main() {
  var proj = app.project;
  if (!proj) { alert("No project open. Please open a project first."); return; }

  // Ask user for the unzipped export folder
  var rootFolder = Folder.selectDialog("Select the unzipped Premiere Ready folder");
  if (!rootFolder) return;

  // Get or create active sequence
  var seq = proj.activeSequence;
  if (!seq) {
    // Create a new sequence — user may need to set up manually
    alert("No active sequence. Please create a sequence first (File > New > Sequence), then run this script again.");
    return;
  }

  // Ensure enough video tracks exist (V1 = footage, V2 = fullscreen, V3 = overlays)
  while (seq.videoTracks.numTracks < 4) {
    seq.videoTracks.addTrack();
  }

  var imported = 0;
  var failed = [];

  for (var i = 0; i < clips.length; i++) {
    var c = clips[i];
    var track = c.isOv ? 2 : 1; // V2 for fullscreen, V3 for overlays
    var startTicks = c.startSec * TICKS_PER_SECOND;

    // Try PNG sequence folder first (animated)
    var seqFolder = new Folder(rootFolder.fsName + "/" + c.folder);
    var firstFrame = new File(seqFolder.fsName + "/frame_0001.png");

    if (seqFolder.exists && firstFrame.exists) {
      // Import as image sequence — suppressUI=true, targetBin=root, asNumberedStills=true
      try {
        // Set image sequence import preference
        app.setSDKEventMessage("Importing: " + c.label, "info");

        // Import the first frame — Premiere auto-detects the sequence
        var importArray = [firstFrame.fsName];
        if (proj.importFiles(importArray, true, proj.rootItem, true)) {
          // Find the just-imported item (last in root bin)
          var item = proj.rootItem.children[proj.rootItem.children.numItems - 1];
          if (item) {
            // Place on timeline at the correct timecode
            seq.videoTracks[track].insertClip(item, startTicks / TICKS_PER_SECOND);
            imported++;
            continue;
          }
        }
      } catch(e) {
        // Fall through to still PNG
      }
    }

    // Fallback: import still PNG
    var stillFile = new File(rootFolder.fsName + "/" + c.folder + ".png");
    if (stillFile.exists) {
      try {
        if (proj.importFiles([stillFile.fsName])) {
          var item2 = proj.rootItem.children[proj.rootItem.children.numItems - 1];
          if (item2) {
            seq.videoTracks[track].insertClip(item2, startTicks / TICKS_PER_SECOND);
            imported++;
            continue;
          }
        }
      } catch(e2) {}
    }

    failed.push(c.label);
  }

  var msg = "Done! Imported " + imported + " of " + clips.length + " graphics.";
  if (failed.length > 0) {
    msg += "\\n\\nFailed (" + failed.length + "):\\n" + failed.join("\\n");
  }
  msg += "\\n\\nFullscreen graphics on V2, Overlays on V3.";
  msg += "\\nYour footage goes on V1.";
  alert(msg);
}

main();
`;
}

function generateGraphicsXML(graphics, ratio, prefix, projectName) {
  const { W, H } = RATIOS[ratio] || RATIOS["16:9"];
  const FPS = 25;
  const pn = (projectName||"Project").replace(/\s+/g,"_");
  const toF = sec => Math.round(sec * FPS);
  const tsToSec = ts => { const p=(ts||"00:00:00").split(":").map(Number); return p[0]*3600+p[1]*60+(p[2]||0); };
  const lastEnd = graphics.reduce((max,g) => {
    const s=tsToSec(g.timestamp); return Math.max(max, s+(g.duration||4));
  }, 60);
  const totalFrames = toF(lastEnd) + FPS;
  const tagged = graphics.map((g,idx)=>({...g,_origIdx:idx}));
  const fullscreen = tagged.filter(g => (g.typeOverride||(TMPL[g.template]||{}).type)==="fullscreen");
  const overlays = tagged.filter(g => (g.typeOverride||(TMPL[g.template]||{}).type)!=="fullscreen");

  // Sort each track by timecode and trim durations to prevent overlap
  const trimTrack = (track) => {
    const sorted = [...track].sort((a,b) => tsToSec(a.timestamp) - tsToSec(b.timestamp));
    return sorted.map((g, i) => {
      const startSec = tsToSec(g.timestamp);
      const maxDur = g.duration || 4;
      // If next clip exists on same track, trim this clip to not overlap
      const nextStart = i < sorted.length - 1 ? tsToSec(sorted[i+1].timestamp) : Infinity;
      const trimmedDur = Math.min(maxDur, nextStart - startSec);
      return { ...g, _trimmedDur: Math.max(0.5, trimmedDur) }; // min 0.5s
    });
  };

  const makeClip = (g, i, trackId) => {
    const sf = toF(tsToSec(g.timestamp));
    const dur = toF(g._trimmedDur || g.duration || 4);
    const idx = (g._origIdx != null ? g._origIdx : i);
    const fn = `${pn}_${prefix}${String(idx+1).padStart(2,"0")}_${(g.label||g.template).replace(/[^a-z0-9_-]/gi,"_")}`;
    const fileId = `${trackId}_file_${i+1}`;
    // Reference first frame of PNG sequence — Premiere imports as image sequence
    const seqPath = `${fn}/frame_0001.png`;
    return `          <clipitem id="${trackId}_clip_${i+1}">
            <name>${fn}</name>
            <duration>${dur}</duration>
            <rate><timebase>${FPS}</timebase><ntsc>FALSE</ntsc></rate>
            <start>${sf}</start>
            <end>${sf+dur}</end>
            <in>0</in>
            <out>${dur}</out>
            <file id="${fileId}">
              <name>${fn}</name>
              <pathurl>${seqPath}</pathurl>
              <duration>${dur}</duration>
              <rate><timebase>${FPS}</timebase><ntsc>FALSE</ntsc></rate>
              <media>
                <video>
                  <samplecharacteristics>
                    <width>${W}</width>
                    <height>${H}</height>
                    <pixelaspectratio>square</pixelaspectratio>
                    <anamorphic>FALSE</anamorphic>
                    <fielddominance>none</fielddominance>
                    <alphatype>straight</alphatype>
                  </samplecharacteristics>
                </video>
              </media>
            </file>
          </clipitem>`;
  };

  const fsClips = trimTrack(fullscreen).map((g,i) => makeClip(g,i,"fs")).join("\n");
  const ovClips = trimTrack(overlays).map((g,i) => makeClip(g,i,"ov")).join("\n");

  return `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE xmeml>
<xmeml version="5">
  <sequence id="gfx_seq">
    <name>${(projectName||"Graphics").replace(/[<>&"]/g,"_")} ${ratio}</name>
    <duration>${totalFrames}</duration>
    <rate>
      <timebase>${FPS}</timebase>
      <ntsc>FALSE</ntsc>
    </rate>
    <timecode>
      <string>00:00:00:00</string>
      <frame>0</frame>
      <rate><timebase>${FPS}</timebase><ntsc>FALSE</ntsc></rate>
      <displayformat>NDF</displayformat>
    </timecode>
    <media>
      <video>
        <format>
          <samplecharacteristics>
            <width>${W}</width>
            <height>${H}</height>
            <pixelaspectratio>square</pixelaspectratio>
            <fielddominance>none</fielddominance>
          </samplecharacteristics>
        </format>
        <track>
${fsClips}
        </track>
        <track>
${ovClips}
        </track>
      </video>
    </media>
  </sequence>
</xmeml>`;
}

// ═══════════════════════════════════════════════════════════════
//  COMPOSITE VIDEO GENERATOR
// ═══════════════════════════════════════════════════════════════
function recordCompositeVideo(graphics, brand, ratio, onProgress) {
  return new Promise((resolve, reject) => {
    const AR = RATIOS[ratio||"16:9"]||RATIOS["16:9"];
    const cvs = document.createElement("canvas"); cvs.width=AR.W; cvs.height=AR.H;
    const ctx = cvs.getContext("2d");
    const FPS = 25;
    const tsToSec = ts => { const p=ts.split(":").map(Number); return p[0]*3600+p[1]*60+(p[2]||0); };
    // Sort graphics by timestamp
    const sorted = [...graphics].sort((a,b) => tsToSec(a.timestamp||"00:00:00") - tsToSec(b.timestamp||"00:00:00"));
    // Total duration = last graphic end + 1s buffer
    const lastEnd = sorted.reduce((max,g) => Math.max(max, tsToSec(g.timestamp||"00:00:00")+(g.duration||4)), 0);
    const totalDurMs = (lastEnd + 1) * 1000;
    const rec = new MediaRecorder(cvs.captureStream(0), {mimeType:MIME(), videoBitsPerSecond:8000000});
    const ch = []; rec.ondataavailable = e => { if(e.data.size>0) ch.push(e.data); };
    rec.onstop = () => resolve(new Blob(ch, {type:"video/webm"}));
    rec.onerror = reject;
    rec.start();
    const startT = performance.now();
    const tick = () => {
      const elapsed = performance.now() - startT;
      const currentSec = elapsed / 1000;
      ctx.clearRect(0, 0, AR.W, AR.H);
      // Find all active graphics at this timestamp
      sorted.forEach(g => {
        const gStart = tsToSec(g.timestamp||"00:00:00");
        const gEnd = gStart + (g.duration||4);
        if(currentSec >= gStart && currentSec < gEnd) {
          const localP = (currentSec - gStart); // seconds since graphic started
          drawGraphic(cvs, g, brand, ratio, localP);
        }
      });
      if(onProgress) onProgress(elapsed / totalDurMs);
      if(elapsed < totalDurMs) requestAnimationFrame(tick);
      else rec.stop();
    };
    requestAnimationFrame(tick);
  });
}

// ═══════════════════════════════════════════════════════════════
//  CANVAS UTILS
// ═══════════════════════════════════════════════════════════════
function rrPath(ctx,x,y,w,h,r){
  const[tl,tr,br,bl]=typeof r==="number"?[r,r,r,r]:r;
  ctx.beginPath();ctx.moveTo(x+tl,y);ctx.lineTo(x+w-tr,y);ctx.quadraticCurveTo(x+w,y,x+w,y+tr);
  ctx.lineTo(x+w,y+h-br);ctx.quadraticCurveTo(x+w,y+h,x+w-br,y+h);
  ctx.lineTo(x+bl,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-bl);
  ctx.lineTo(x,y+tl);ctx.quadraticCurveTo(x,y,x+tl,y);ctx.closePath();
}
function fitFont(ctx,text,maxW,maxH,baseSz,weight,maxLines,ff,lhMult=1.30){
  let sz=baseSz;
  while(sz>20){
    ctx.font=`${weight} ${sz}px "${ff}","Arial",sans-serif`;
    const lh=sz*lhMult,words=(text||"").split(" ");let lines=0,line="";
    for(const w of words){const t=line+w+" ";if(ctx.measureText(t).width>maxW&&line){lines++;line=w+" ";}else line=t;}
    if(line.trim())lines++;
    if(lines<=maxLines&&lines*lh<=maxH)break;sz-=3;
  }
  return{sz,lh:sz*lhMult};
}
function drawText(ctx,text,x,y,maxW,maxH,baseSz,weight,align,color,maxLines=3,ff="Montserrat",lhMult=1.30){
  if(!text)return y;
  const{sz,lh}=fitFont(ctx,text,maxW,maxH,baseSz,weight||"700",maxLines,ff,lhMult);
  ctx.font=`${weight||"700"} ${sz}px "${ff}","Arial",sans-serif`;
  ctx.fillStyle=color||"#fff";ctx.textAlign=align||"center";ctx.textBaseline="alphabetic";
  const ascent=Math.round(sz*0.82);
  // Handle manual line breaks (\n) first, then smart-wrap each paragraph
  const BREAK_BEFORE=new Set(["but","and","or","nor","yet","so","for","with","from","that","which","where","when","while","after","before","during","until","unless","because","although","if","then"]);
  const paragraphs=text.split("\n");
  let finalLines=[];
  for(const para of paragraphs){
    if(!para.trim()){finalLines.push("");continue;}
    const words=para.split(" ");
    // Greedy wrap
    const greedyLines=[];let gl="";
    for(const w of words){const t=gl+w+" ";if(ctx.measureText(t).width>maxW&&gl){greedyLines.push(gl.trim());gl=w+" ";}else gl=t;}
    if(gl.trim())greedyLines.push(gl.trim());
    // If 2 lines, try balanced break
    let paraLines=greedyLines;
    if(greedyLines.length===2&&words.length>=4){
      let bestIdx=-1,bestScore=Infinity;
      for(let i=1;i<words.length;i++){
        const l1=words.slice(0,i).join(" "),l2=words.slice(i).join(" ");
        const w1=ctx.measureText(l1).width,w2=ctx.measureText(l2).width;
        if(w1>maxW||w2>maxW)continue;
        let score=Math.abs(w1-w2);
        if(BREAK_BEFORE.has(words[i].toLowerCase().replace(/[^a-z]/g,"")))score*=0.4;
        if(score<bestScore){bestScore=score;bestIdx=i;}
      }
      if(bestIdx>0)paraLines=[words.slice(0,bestIdx).join(" "),words.slice(bestIdx).join(" ")];
    }
    finalLines.push(...paraLines);
  }
  // Render lines
  let cy=y+ascent,count=0;
  for(const ln of finalLines){
    if(count>=maxLines||cy>y+maxH)break;
    ctx.fillText(ln,x,cy);cy+=lh;count++;
  }
  return cy;
}
function stamp(ctx,brand,W,H,darkBg=true){
  const MARGIN=W*0.05;  // 5% safe zone margin
  const opacity=Math.min(1,Math.max(0,brand.logoOpacity??0.75));
  // Pick logo: white for dark backgrounds, teal for light backgrounds
  const logoSrc=darkBg?(brand.logoDataUrlLight||brand.logoDataUrl):brand.logoDataUrl;
  if(logoSrc){
    const img=getCachedImage(logoSrc);
    if(img){
      const logoW=Math.round(W*Math.min(0.25,Math.max(0.04,brand.logoSize??0.10)));
      const logoH=Math.round(logoW*(img.naturalHeight/img.naturalWidth));
      const pos=brand.logoPosition||"br";
      const x=pos.includes("r")?W-MARGIN-logoW:MARGIN;
      const y=pos.includes("b")?H-MARGIN-logoH:MARGIN;
      ctx.save();ctx.globalAlpha=opacity;ctx.drawImage(img,x,y,logoW,logoH);ctx.restore();
    }
    return;
  }
  // Text fallback
  if(!brand.channelName)return;
  ctx.save();ctx.globalAlpha=0.22;
  ctx.font=`600 ${Math.round(W*0.014)}px "${brand.fontFamily}","Arial",sans-serif`;
  ctx.fillStyle="#fff";ctx.textAlign="right";ctx.textBaseline="alphabetic";
  ctx.fillText(brand.channelName.toUpperCase(),W-MARGIN,H-H*0.035);ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
//  ICONS
// ═══════════════════════════════════════════════════════════════
function drawIcon(ctx,name,cx,cy,size,color,style){
  const r=size/2,lw=Math.max(4,size*0.095);
  ctx.save();ctx.translate(cx,cy);ctx.strokeStyle=color;ctx.fillStyle=color;
  ctx.lineWidth=lw;ctx.lineCap="round";ctx.lineJoin="round";
  const disc=(a=0.2)=>{ctx.save();ctx.globalAlpha=a;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();ctx.restore();};
  if(name==="cross"){if(style==="filled")disc();const a=r*0.46;ctx.beginPath();ctx.moveTo(-a,-a);ctx.lineTo(a,a);ctx.stroke();ctx.beginPath();ctx.moveTo(a,-a);ctx.lineTo(-a,a);ctx.stroke();}
  else if(name==="check"){if(style==="filled")disc();ctx.beginPath();ctx.moveTo(-r*0.52,r*0.02);ctx.lineTo(-r*0.06,r*0.48);ctx.lineTo(r*0.60,-r*0.52);ctx.stroke();}
  else if(name==="info"){ctx.beginPath();ctx.arc(0,0,r*0.9,0,Math.PI*2);if(style==="filled"){ctx.save();ctx.globalAlpha=0.2;ctx.fill();ctx.restore();}ctx.stroke();ctx.beginPath();ctx.arc(0,-r*0.44,lw*0.6,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.moveTo(0,-r*0.16);ctx.lineTo(0,r*0.52);ctx.stroke();}
  else if(name==="question"){ctx.beginPath();ctx.arc(0,0,r*0.9,0,Math.PI*2);if(style==="filled"){ctx.save();ctx.globalAlpha=0.2;ctx.fill();ctx.restore();}ctx.stroke();ctx.font=`900 ${r*1.0}px Arial,sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("?",0,r*0.07);}
  else if(name==="warning"){if(style==="filled")disc(0.2);ctx.beginPath();ctx.moveTo(0,-r*0.88);ctx.lineTo(r*0.84,r*0.68);ctx.lineTo(-r*0.84,r*0.68);ctx.closePath();ctx.stroke();ctx.beginPath();ctx.moveTo(0,-r*0.38);ctx.lineTo(0,r*0.18);ctx.stroke();ctx.beginPath();ctx.arc(0,r*0.42,lw*0.55,0,Math.PI*2);ctx.fill();}
  else if(name==="lock"){const bw=r*1.2,bh=r*0.95,bx=-bw/2,by=r*0.05;if(style==="filled"){ctx.save();ctx.globalAlpha=0.2;rrPath(ctx,bx,by,bw,bh,4);ctx.fill();ctx.restore();}rrPath(ctx,bx,by,bw,bh,4);ctx.stroke();ctx.beginPath();ctx.arc(0,by,bw*0.36,Math.PI,0);ctx.stroke();}
  else if(name==="calendar"){const bw=r*1.4,bh=r*1.3,bx=-bw/2,by=-r*0.75;if(style==="filled"){ctx.save();ctx.globalAlpha=0.2;rrPath(ctx,bx,by,bw,bh,5);ctx.fill();ctx.restore();}rrPath(ctx,bx,by,bw,bh,5);ctx.stroke();ctx.beginPath();ctx.moveTo(bx,by+bh*0.34);ctx.lineTo(bx+bw,by+bh*0.34);ctx.stroke();[0.28,0.72].forEach(p=>{ctx.beginPath();ctx.moveTo(bx+bw*p,by-lw*0.4);ctx.lineTo(bx+bw*p,by+lw*1.6);ctx.stroke();});}
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
//  EASING
// ═══════════════════════════════════════════════════════════════
const easeOut  = t => 1-(1-t)**3;
const easeBack = t => { const c=1.70158+1; return 1+c*(t-1)**3+1.70158*(t-1)**2; };
const easeOutOnly = t => 1-(1-t)**2; // no overshoot — smooth decel only
const easeBackTight = t => { const c=1.2+1; return 1+c*(t-1)**3+1.2*(t-1)**2; }; // tighter spring
const easeBackBig = t => { const c=2.8+1; return 1+c*(t-1)**3+2.8*(t-1)**2; }; // exaggerated spring
const clamp    = (v,a,b) => Math.max(a,Math.min(b,v));

// ── Animation Presets ──────────────────────────────────────────
const ANIM_PRESETS = {
  default: { label:"Default",   icon:"▶",  entMul:2,   txtMul:2.5, txtDelay:0.15, easeFn:easeOut,     easeBackFn:easeBack,      feel:"Current behaviour" },
  snappy:  { label:"Snappy",    icon:"⚡", entMul:3.5, txtMul:4,   txtDelay:0.08, easeFn:easeOut,     easeBackFn:easeBackTight,  feel:"Fast, punchy" },
  gentle:  { label:"Gentle",    icon:"🌊", entMul:1.2, txtMul:1.8, txtDelay:0.20, easeFn:easeOutOnly, easeBackFn:easeOutOnly,    feel:"Smooth, elegant" },
  punchy:  { label:"Punchy",    icon:"💥", entMul:2.8, txtMul:3.2, txtDelay:0.10, easeFn:easeOut,     easeBackFn:easeBackBig,    feel:"Bouncy, social-media" },
};

// ── Style Extraction Mappings ─────────────────────────────────
const FONT_MAP  = { condensed:"Barlow Condensed", sans:"DM Sans", display:"Anton", serif:"Lora" };
const RADIUS_MAP = { sharp:0, slight:8, rounded:18, pill:32 };
const LH_MAP     = { tight:1.15, normal:1.30, airy:1.55 };

const EXTRACTION_PROMPT = `Analyse this graphic/screenshot and extract the visual style.
Return ONLY valid JSON, no markdown:
{
  "colorPrimary": "#hex — the main background or card colour",
  "colorAccent": "#hex — the strongest highlight/emphasis colour",
  "colorPositive": "#hex — secondary accent if present, else similar to colorAccent",
  "colorText": "#hex — the main text colour",
  "fontStyle": "condensed|sans|serif|display — best description of the font style",
  "fontWeight": "700|800|900 — approximate heading weight",
  "lineHeightFeel": "tight|normal|airy",
  "cornerRadiusFeel": "sharp|slight|rounded|pill",
  "iconStyle": "line|filled",
  "overallFeel": "bold|minimal|editorial|playful|corporate",
  "animationSuggestion": "snappy|default|gentle|punchy",
  "notes": "any other observations about the visual style"
}`;

function mapExtractedStyle(raw){
  return {
    colorPrimary:     raw.colorPrimary    || undefined,
    colorAccent:      raw.colorAccent     || undefined,
    colorPositive:    raw.colorPositive   || undefined,
    colorText:        raw.colorText       || undefined,
    fontFamily:       FONT_MAP[raw.fontStyle]  || "Montserrat",
    headingWeight:    raw.fontWeight      || "800",
    lineHeight:       LH_MAP[raw.lineHeightFeel] || 1.30,
    cornerRadius:     RADIUS_MAP[raw.cornerRadiusFeel]!==undefined ? RADIUS_MAP[raw.cornerRadiusFeel] : 18,
    iconStyle:        (raw.iconStyle==="filled"||raw.iconStyle==="line") ? raw.iconStyle : "line",
    animationPreset:  ["snappy","default","gentle","punchy"].includes(raw.animationSuggestion) ? raw.animationSuggestion : "default",
  };
}

// ═══════════════════════════════════════════════════════════════
//  GRAPHIC RENDERER
// ═══════════════════════════════════════════════════════════════
function drawGraphic(canvas,g,brand,ratio,progress=1){
  const AR=RATIOS[ratio||"16:9"]||RATIOS["16:9"];
  const W=AR.W,H=AR.H;canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext("2d",{alpha:true});ctx.clearRect(0,0,W,H);
  const B={...DEFAULT_BRAND,...brand};
  const R=Math.max(0,Number(B.cornerRadius)||18);
  const IC=B.iconStyle||"line";
  const FF=B.fontFamily||"Montserrat";

    const bH=isCompact?Math.round(320*sc):Math.round(260*sc);
    // Position: landlord=right, tenant=left
    const bX=isLandlord?(isCompact?PAD*0.75:W-bW-Math.round(80*sc)):(isCompact?PAD*0.75:Math.round(80*sc));
    const bY=isCompact?(H-bH-Math.round(100*sc)):(H/2-bH/2);
    // Slide in from the relevant side
    const slideDir=isLandlord?1:-1;
    ctx.save();ctx.translate(slideDir*(1-ENT)*bW*0.5,0);ctx.globalAlpha=ENT;
    // Card
    ctx.shadowColor="rgba(0,0,0,0.22)";ctx.shadowBlur=32;
    rrPath(ctx,bX,bY,bW,bH,R);ctx.fillStyle=CW;ctx.fill();ctx.shadowBlur=0;
    // Accent bar — clipped inside card shape
    ctx.save();rrPath(ctx,bX,bY,bW,bH,R);ctx.clip();
    ctx.fillStyle=accentCol;ctx.fillRect(bX,bY,bW,Math.round(5*sc));
    ctx.restore();
    // Label — small caps at top
    const textX=bX+cp;
    const textW=bW-cp*2-Math.round(14*sc);
    const labelSize=Math.round(20*sc);
    const labelY=bY+cp+Math.round(16*sc);
    ctx.font=`700 ${labelSize}px "${FF}","Arial",sans-serif`;
    ctx.fillStyle=accentCol;ctx.textAlign="left";ctx.textBaseline="alphabetic";
    ctx.letterSpacing="2px";ctx.fillText(labelText,textX,labelY);ctx.letterSpacing="0px";
    // Separator line
    const sepY=labelY+Math.round(12*sc);
    ctx.fillStyle=accentCol+"44";ctx.fillRect(textX,sepY,Math.round(60*sc),Math.round(2*sc));
    // Question text — serif, teal, below separator
    const qY=sepY+Math.round(18*sc);
    DT(c.text||"",textX,qY,textW,bH-(qY-bY)-cp,Math.round(36*sc),"600","left",B.colorPrimary,4,FFS);
    ctx.restore();
  }
  else if(t==="subscribe"){
    // Like & Subscribe overlay — compact branded card
    const cp=Math.round(28*sc);
    const bW=isCompact?W-PAD*1.5:Math.round(540*sc);
    const bH=Math.round(isCompact?180*sc:160*sc);
    const bX=isCompact?(W-bW)/2:W-bW-Math.round(80*sc);
    const bY=isCompact?H-bH-Math.round(100*sc):H-bH-Math.round(80*sc);
    // Scale-bounce entrance
    const sc2=easeBack(ENT);
    ctx.save();ctx.translate(bX+bW/2,bY+bH/2);ctx.scale(sc2,sc2);ctx.translate(-(bX+bW/2),-(bY+bH/2));ctx.globalAlpha=ENT;
    // Card with shadow
    ctx.shadowColor="rgba(0,0,0,0.25)";ctx.shadowBlur=32;
    rrPath(ctx,bX,bY,bW,bH,R);ctx.fillStyle=B.colorPrimary;ctx.fill();ctx.shadowBlur=0;
    // Accent bar top — salmon
    ctx.save();rrPath(ctx,bX,bY,bW,bH,R);ctx.clip();
    ctx.fillStyle=B.colorAccent;ctx.fillRect(bX,bY,bW,Math.round(5*sc));
    ctx.restore();
    // Bell/thumbs icon
    const icY=bY+bH*0.38;
    ctx.font=`${Math.round(36*sc)}px Arial,sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("👍",bX+cp+Math.round(16*sc),icY);
    // "Like & Subscribe" text
    DT(c.text||"Like & Subscribe",bX+cp+Math.round(50*sc),bY+cp,bW-cp*2-Math.round(50*sc),bH*0.4,Math.round(34*sc),"700","left","#fff",1,FFS);
    // Subline — channel or handle
    const subText=c.body||B.endboardHandles||B.channelName||"";
    if(subText){
      DT(subText,bX+cp+Math.round(50*sc),bY+bH*0.52,bW-cp*2-Math.round(50*sc),bH*0.3,Math.round(22*sc),"400","left","rgba(255,255,255,0.55)",1);
    }
    ctx.restore();
  }
  else if(t==="lower_third"){
    // News-style name strap — bottom-left, slim card, teal accent bar
    const cp=Math.round(20*sc);
    const bW=isCompact?W-PAD*1.5:Math.round(520*sc);
    const bH=Math.round(isCompact?120*sc:100*sc);
    const bX=isCompact?PAD*0.75:Math.round(60*sc);
    const bY=H-bH-Math.round(isCompact?80*sc:60*sc);
    // Slide in from left
    ctx.save();ctx.translate(-(1-ENT)*bW*0.6,0);ctx.globalAlpha=ENT;
    // Dark semi-transparent card
    ctx.shadowColor="rgba(0,0,0,0.3)";ctx.shadowBlur=24;
    rrPath(ctx,bX,bY,bW,bH,Math.round(8*sc));ctx.fillStyle="rgba(0,0,0,0.75)";ctx.fill();ctx.shadowBlur=0;
    // Teal accent bar left edge (clipped inside card)
    ctx.save();rrPath(ctx,bX,bY,bW,bH,Math.round(8*sc));ctx.clip();
    ctx.fillStyle=B.colorPrimary;ctx.fillRect(bX,bY,Math.round(5*sc),bH);
    ctx.restore();
    // Name — bold serif
    const nameX=bX+cp+Math.round(10*sc);
    DT(c.name||"",nameX,bY+cp,bW-cp*2,bH*0.38,Math.round(32*sc),"700","left","#fff",1,FFS);
    // Title + Company — smaller sans-serif
    const roleText=[c.title,c.company].filter(Boolean).join(" · ");
    DT(roleText,nameX,bY+cp+Math.round(36*sc),bW-cp*2,bH*0.3,Math.round(20*sc),"400","left","rgba(255,255,255,0.7)",1);
    ctx.restore();
  }
  else if(t==="advice"){
    // Advice overlay — warm cream card with lightbulb icon, centered bottom
    const cp=Math.round(28*sc);
    const bW=isCompact?W-PAD*1.5:Math.round(620*sc);
    const bH=isCompact?Math.round(260*sc):Math.round(220*sc);
    const bX=(W-bW)/2;
    const bY=isCompact?H-bH-Math.round(100*sc):H-bH-Math.round(80*sc);
    // Scale-bounce entrance
    const sc2=easeBack(ENT);
    ctx.save();ctx.translate(bX+bW/2,bY+bH/2);ctx.scale(sc2,sc2);ctx.translate(-(bX+bW/2),-(bY+bH/2));ctx.globalAlpha=ENT;
    // Card
    ctx.shadowColor="rgba(0,0,0,0.22)";ctx.shadowBlur=32;
    rrPath(ctx,bX,bY,bW,bH,R);ctx.fillStyle=CW;ctx.fill();ctx.shadowBlur=0;
    // Salmon accent bar top (clipped)
    ctx.save();rrPath(ctx,bX,bY,bW,bH,R);ctx.clip();
    ctx.fillStyle=B.colorAccent;ctx.fillRect(bX,bY,bW,Math.round(5*sc));
    ctx.restore();
    // Label "ADVICE" in salmon
    const textX=bX+cp;
    const textW=bW-cp*2;
    ctx.font=`700 ${Math.round(20*sc)}px "${FF}","Arial",sans-serif`;
    ctx.fillStyle=B.colorAccent;ctx.textAlign="left";ctx.textBaseline="alphabetic";
    ctx.letterSpacing="2px";ctx.fillText("ADVICE",textX,bY+cp+Math.round(16*sc));ctx.letterSpacing="0px";
    // Separator
    ctx.fillStyle=B.colorAccent+"44";ctx.fillRect(textX,bY+cp+Math.round(28*sc),Math.round(60*sc),Math.round(2*sc));
    // Body text — serif, teal
    DT(c.text||"",textX,bY+cp+Math.round(44*sc),textW,bH-cp*2-Math.round(52*sc),Math.round(36*sc),"600","left",B.colorPrimary,4,FFS);
    ctx.restore();
  }
  else if(t==="endboard"){
    // Professional closing slide — teal background, large centered logo, CTA text
    ctx.save();ctx.globalAlpha=ENT;
    ctx.fillStyle=B.colorPrimary;ctx.fillRect(0,0,W,H);
    // Animated wavy lines (inline — same as key_point)
    ctx.save();ctx.globalAlpha=0.06*Math.min(1,p*2);ctx.strokeStyle=B.colorWarm||"#f0e1d3";ctx.lineWidth=Math.round(3*sc);
    const waveShift=pRaw*W*0.04;
    for(let wi=0;wi<5;wi++){const off=wi*W*0.22+waveShift*(wi%2?1:-0.6);ctx.beginPath();for(let x=-50;x<W+50;x+=4){ctx.lineTo(x,H*0.3+Math.sin((x+off)*0.003)*H*0.25+wi*H*0.12);}ctx.stroke();}
    ctx.restore();
    // Adaptive layout: portrait pushes content up, landscape centres it
    const logoFrac=isCompact?0.35:0.28;
    const sepFrac=isCompact?0.50:0.46;
    const ctaFrac=isCompact?0.55:0.52;
    const bodyFrac=isCompact?0.12:0.13;
    const handleFrac=isPortrait?0.82:isSquare?0.85:0.88;
    const logoSizeFrac=isCompact?0.40:0.28;
    const headSz=isCompact?Math.round(56*sc):Math.round(52*sc);
    const bodySz=isCompact?Math.round(32*sc):Math.round(30*sc);
    // Centered logo — large
    const logoSrc=B.logoDataUrlLight||B.logoDataUrl;
    if(logoSrc){
      const img=getCachedImage(logoSrc);
      if(img){
        const logoW=Math.round(W*logoSizeFrac);
        const logoH=Math.round(logoW*(img.naturalHeight/img.naturalWidth));
        const lx=(W-logoW)/2,ly=H*logoFrac-logoH/2;
        const logoScale=AP.easeBackFn(clamp(ENT*1.5,0,1));
        ctx.save();ctx.globalAlpha=ENT;ctx.translate(lx+logoW/2,ly+logoH/2);ctx.scale(logoScale,logoScale);ctx.drawImage(img,-logoW/2,-logoH/2,logoW,logoH);ctx.restore();
      }
    }
    // Subtle pulse — eases in gradually after entrance completes
    const pulseRamp=clamp((pRaw-1)*0.5,0,1); // 0→1 over 2 seconds after entrance
    const pulseAmt=pulseRamp*0.06; // max 6% scale variation
    const pulse=1-pulseAmt+pulseAmt*Math.sin(pRaw*Math.PI*0.6); // slow ~1.7s cycle
    const pulseAlpha=1-pulseRamp*0.12+pulseRamp*0.12*Math.sin(pRaw*Math.PI*0.6);
    // Separator — salmon accent line
    const sepW=Math.round(120*sc*ENT);
    ctx.save();ctx.globalAlpha=pulseAlpha;
    ctx.fillStyle=B.colorAccent;ctx.fillRect(W/2-sepW/2,H*sepFrac,sepW,Math.round(3*sc));
    ctx.restore();
    // CTA headline — use brand endboard fields first, then content fields, then defaults
    const ctaY=H*ctaFrac;
    const ctaText=c.headline||B.endboardCTA||"Thanks for watching";
    const handleText=c.handle||B.endboardHandles||"";
    const websiteText=B.endboardWebsite||"";
    const bodyText=c.body||"";
    DT(ctaText,W/2,ctaY,W*0.7,H*0.12,headSz,"700","center","#fff",2,FFS);
    // Body text — with subtle pulse
    if(bodyText){
      const bodyY=ctaY+H*bodyFrac;
      ctx.save();ctx.translate(W/2,bodyY+H*0.04);ctx.scale(pulse,pulse);ctx.translate(-W/2,-(bodyY+H*0.04));
      DT(bodyText,W/2,bodyY,W*0.6,H*0.10,bodySz,"400","center","rgba(255,255,255,0.7)",2);
      ctx.restore();
    }
    // Social handles + website
    const bottomLine=[handleText,websiteText].filter(Boolean).join("  ·  ");
    if(bottomLine){
      ctx.font=`500 ${Math.round(24*sc)}px "${FF}","Arial",sans-serif`;
      ctx.fillStyle="rgba(255,255,255,0.5)";ctx.textAlign="center";ctx.textBaseline="alphabetic";
      ctx.fillText(bottomLine,W/2,H*handleFrac);
    }
    ctx.restore();
  }
  else if(t==="title_card"){
    // Delegate to drawTitleCard with content merged into brand
    const tcBrand={...brand,
      titleCardTitle:c.headline||brand.titleCardTitle||"EPISODE TITLE",
      titleCardSeriesName:c.subheadline||brand.titleCardSeriesName||"",
      titleCardSubtitle:c.body||brand.titleCardSubtitle||"",
      titleCardStyle:c.style||brand.titleCardStyle||"split",
    };
    drawTitleCard(canvas,tcBrand,ratio,p);
    return; // drawTitleCard handles its own canvas setup
  }
  else if(t==="endboard"){
    // Delegate to drawEndboard with content merged into brand
    const ebBrand={...brand,
      endboardCTA:c.headline||brand.endboardCTA||"Thanks for watching",
      endboardHandles:c.handle||brand.endboardHandles||"",
      endboardWebsite:c.website||brand.endboardWebsite||"",
      endboardStyle:c.style||brand.endboardStyle||"logo",
    };
    drawEndboard(canvas,ebBrand,ratio,p);
    return; // drawEndboard handles its own canvas setup
  }
  else {
    // ── FALLBACK: unrecognised template ──
    // Render as a generic fullscreen card so it's never transparent.
    if(!isOverlay){ctx.fillStyle=B.colorPrimary;ctx.fillRect(0,0,W,H);
      ctx.save();ctx.globalAlpha=0.04;for(let i=0;i<W;i+=3){for(let j=0;j<H;j+=3){if(Math.random()>0.5){ctx.fillStyle="#fff";ctx.fillRect(i,j,2,2);}}}ctx.restore();
    }
    const lbl=(t||"graphic").toUpperCase().replace(/_/g," ");
    ctx.save();ctx.globalAlpha=ENT*0.6;
    ctx.font=`700 ${Math.round(28*sc)}px "${FF}","Arial",sans-serif`;
    const lw=ctx.measureText(lbl).width;
    ctx.fillStyle="rgba(0,0,0,0.3)";rrPath(ctx,W/2-lw/2-20*sc,H*0.22,lw+40*sc,48*sc,24*sc);ctx.fill();
    ctx.fillStyle="#fff";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(lbl,W/2,H*0.22+24*sc);ctx.restore();
    const rW=Math.round(60*sc)*ENT;
    ctx.fillStyle=B.colorAccent;ctx.fillRect(W/2-rW/2,H*0.32,rW,Math.round(4*sc));
    const allText=Object.values(c).filter(v=>typeof v==="string"&&v.length>0);
    if(allText[0]){ctx.save();ctx.globalAlpha=TXT;DT(allText[0],W/2,H*0.36,W-PAD*2,H*0.28,Math.round(72*sc),"HW","center","#fff",3);ctx.restore();}
    if(allText[1]){ctx.save();ctx.globalAlpha=TXT*0.65;DT(allText.slice(1).join(" — "),W/2,H*0.68,W-PAD*2,H*0.15,Math.round(36*sc),"500","center","rgba(255,255,255,0.8)",2);ctx.restore();}
    stamp(ctx,B,W,H);
  }
}

// ═══════════════════════════════════════════════════════════════
//  CAPTION RENDERER
// ═══════════════════════════════════════════════════════════════
function estimateWordTimings(words,dur){
  const clean=words.map(w=>w.replace(/[^a-zA-Z0-9']/g,""));
  const total=clean.reduce((s,w)=>s+Math.max(w.length,1),0);
  const GAP=Math.min(0.04,dur/(words.length*8));const usable=dur-GAP*(words.length-1);
  let t=0;
  return words.map((word,i)=>{const d=(Math.max(clean[i].length,1)/total)*usable;const tm={word,start:t,end:t+d};t+=d+GAP;return tm;});
}

function drawCaption(canvas,subtitle,brand,captionStyle,currentTime,ratio){
  const AR=RATIOS[ratio||brand.aspectRatio||"9:16"]||RATIOS["9:16"];
  const{W,H}=AR;canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext("2d",{alpha:true});ctx.clearRect(0,0,W,H);
  const B={...DEFAULT_BRAND,...brand};
  const sc=H/1080,FF=B.fontFamily||"Montserrat";
  const CLH=Math.max(1.0,Math.min(2.2,Number(B.captionLineHeight)||1.45)); // caption line height
  const fsize=Math.round((B.captionFontSize||88)*sc);
  const fw=B.captionFontWeight||"800";
  const PAD=Math.round(60*sc);
  const PR=Math.max(0,Math.min(50,Number(B.captionPillRadius)||12)); // pill radius
  const rawWords=subtitle.text.split(/\s+/).filter(Boolean);
  const dispWords=B.captionTextCase==="upper"?rawWords.map(w=>w.toUpperCase()):rawWords;
  const dur=subtitle.endSec-subtitle.startSec;
  const wt=estimateWordTimings(dispWords,dur);
  const activeIdx=wt.findIndex(w=>currentTime>=w.start&&currentTime<w.end);
  const shownUpTo=wt.reduce((acc,w,i)=>currentTime>=w.start?i:acc,-1);
  const yPos={lower:H*0.82,middle:H*0.50,upper:H*0.20};
  const centerY=yPos[B.captionPosition||"lower"]||H*0.82;

  if(B.captionBgOpacity>0){
    ctx.save();ctx.globalAlpha=B.captionBgOpacity;ctx.fillStyle="#000";
    rrPath(ctx,PAD*0.5,centerY-fsize*1.6,W-PAD,fsize*3.2,Math.round(16*sc));ctx.fill();ctx.restore();
  }

  const FONT=`${fw} ${fsize}px "${FF}","Arial",sans-serif`;

  const buildLines=words=>{
    ctx.font=FONT;const maxW=W-PAD*2,lines=[];let line=[],lineW=0;const spW=ctx.measureText(" ").width;
    for(let i=0;i<words.length;i++){
      const ww=ctx.measureText(words[i]).width;
      if(lineW+ww>maxW&&line.length){lines.push(line);line=[{w:words[i],idx:i,ww}];lineW=ww+spW;}
      else{line.push({w:words[i],idx:i,ww});lineW+=ww+spW;}
    }
    if(line.length)lines.push(line);return lines;
  };

  if(captionStyle==="karaoke"){
    ctx.font=FONT;ctx.textBaseline="alphabetic";
    const lines=buildLines(dispWords);const lh=fsize*CLH;
    let startY=centerY-(lines.length*lh)/2+fsize;const spW=ctx.measureText(" ").width;
    for(const ln of lines){
      const lw=ln.reduce((s,e)=>s+e.ww,0)+spW*(ln.length-1);let cx=W/2-lw/2;
      const prog=easeOut(clamp((currentTime-(wt[ln[0].idx]?.start||0))*4,0,1));
      for(const e of ln){
        const isA=e.idx===activeIdx,isPast=e.idx<=shownUpTo&&!isA;
        ctx.save();ctx.translate(0,(1-prog)*fsize*0.35);ctx.globalAlpha=prog*0.95;
        if(isA){const pp=Math.round(14*sc),pH=fsize*1.38;rrPath(ctx,cx-pp,startY-fsize*0.84,e.ww+pp*2,pH,PR*sc);ctx.fillStyle=B.colorPositive;ctx.fill();ctx.fillStyle="#fff";}
        else ctx.fillStyle=isPast?"rgba(255,255,255,0.55)":"rgba(255,255,255,0.30)";
        ctx.shadowColor="rgba(0,0,0,0.7)";ctx.shadowBlur=Math.round(8*sc);ctx.fillText(e.w,cx,startY);ctx.restore();cx+=e.ww+spW;
      }
      startY+=lh;
    }
  }
  else if(captionStyle==="popin"){
    ctx.font=FONT;ctx.textBaseline="alphabetic";
    const lines=buildLines(dispWords);const lh=fsize*CLH;
    let startY=centerY-(lines.length*lh)/2+fsize;const spW=ctx.measureText(" ").width;
    for(const ln of lines){
      const lw=ln.reduce((s,e)=>s+e.ww,0)+spW*(ln.length-1);let cx=W/2-lw/2;
      for(const e of ln){
        const tw=wt[e.idx];if(!tw||currentTime<tw.start){cx+=e.ww+spW;continue;}
        const el=currentTime-tw.start,td=tw.end-tw.start;
        const prog=easeBack(clamp(el/(td*0.6),0,1)),sc2=0.4+prog*0.6;
        ctx.save();ctx.translate(cx+e.ww/2,startY-fsize*0.3);ctx.scale(sc2,sc2);ctx.translate(-(cx+e.ww/2),-(startY-fsize*0.3));
        ctx.globalAlpha=clamp(el/0.08,0,1);ctx.fillStyle=e.idx===activeIdx?B.colorPositive:B.colorText;
        ctx.shadowColor="rgba(0,0,0,0.8)";ctx.shadowBlur=Math.round(10*sc);ctx.textBaseline="alphabetic";ctx.fillText(e.w,cx,startY);ctx.restore();cx+=e.ww+spW;
      }startY+=lh;
    }
  }
  else if(captionStyle==="tiktok"){
    const CHUNK=3;const chunks=[];
    for(let i=0;i<dispWords.length;i+=CHUNK)chunks.push(dispWords.slice(i,i+CHUNK).map((w,j)=>({w,idx:i+j})));
    const aci=chunks.findIndex(ch=>{const f=wt[ch[0].idx],l=wt[ch[ch.length-1].idx];return f&&l&&currentTime>=f.start&&currentTime<=l.end+0.1;});
    const chunk=aci>=0?chunks[aci]:(currentTime>0?chunks[chunks.length-1]:[]);
    if(!chunk||!chunk.length)return;
    const fwt=wt[chunk[0].idx];const cp=easeOut(clamp((currentTime-(fwt?.start||0))*6,0,1));
    ctx.save();ctx.globalAlpha=cp;ctx.translate(0,(1-cp)*fsize*0.4);
    ctx.font=FONT;ctx.textBaseline="alphabetic";const spW=ctx.measureText(" ").width*0.8;
    const meas=chunk.map(e=>({...e,ww:ctx.measureText(e.w).width}));
    const tw=meas.reduce((s,e)=>s+e.ww,0)+spW*(meas.length-1);let cx=W/2-tw/2;
    for(const e of meas){
      const ewt=wt[e.idx];const isA=e.idx===activeIdx||(activeIdx===-1&&currentTime>=(ewt?.end||0));
      if(isA){const pp=Math.round(16*sc),pH=fsize*1.44;rrPath(ctx,cx-pp,centerY-fsize*0.86,e.ww+pp*2,pH,PR*sc);ctx.fillStyle=B.colorPositive;ctx.fill();ctx.fillStyle="#fff";}
      else ctx.fillStyle=B.colorText;
      ctx.shadowColor="rgba(0,0,0,0.85)";ctx.shadowBlur=Math.round(12*sc);ctx.fillText(e.w,cx,centerY);cx+=e.ww+spW;
    }ctx.restore();
  }
  else if(captionStyle==="fade"){
    ctx.font=FONT;ctx.textBaseline="alphabetic";
    const lines=buildLines(dispWords);const lh=fsize*CLH;
    let startY=centerY-(lines.length*lh)/2+fsize;const spW=ctx.measureText(" ").width;
    for(const ln of lines){
      const lw=ln.reduce((s,e)=>s+e.ww,0)+spW*(ln.length-1);let cx=W/2-lw/2;
      for(const e of ln){
        const tw=wt[e.idx];if(!tw||currentTime<tw.start){cx+=e.ww+spW;continue;}
        const prog=easeOut(clamp((currentTime-tw.start)/0.18,0,1));
        ctx.save();ctx.globalAlpha=0.3+prog*0.7;ctx.fillStyle=e.idx===activeIdx?B.colorPositive:B.colorText;
        ctx.shadowColor="rgba(0,0,0,0.9)";ctx.shadowBlur=Math.round(16*sc);ctx.textBaseline="alphabetic";ctx.fillText(e.w,cx,startY);ctx.restore();cx+=e.ww+spW;
      }startY+=lh;
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  BLEED — adds transparent padding around a canvas for safe export
// ═══════════════════════════════════════════════════════════════
function addBleed(srcCanvas, bleed=10){
  const c=document.createElement("canvas");
  c.width=srcCanvas.width+bleed*2;c.height=srcCanvas.height+bleed*2;
  const ctx=c.getContext("2d",{alpha:true});
  ctx.clearRect(0,0,c.width,c.height);
  ctx.drawImage(srcCanvas,bleed,bleed);
  return c;
}

// ═══════════════════════════════════════════════════════════════
//  PNG SEQUENCE — frame-by-frame export for Premiere Pro
// ═══════════════════════════════════════════════════════════════
async function recordPNGSequence(g,brand,ratio,onProgress){
  await document.fonts.ready;
  const r=ratio||"16:9";
  const AR=RATIOS[r]||RATIOS["16:9"];
  const cvs=document.createElement("canvas");cvs.width=AR.W;cvs.height=AR.H;
  // 2s at 25fps = 50 frames (1s entrance + 1s hold/drift)
  // Shorter duration halves memory while keeping full animation
  const dur=2; // fixed 2s — editor can loop/extend in Premiere
  const fps=25;
  const totalFrames=Math.round(dur*fps);
  const animFrames=fps; // entrance over 1s
  const frames=[];
  for(let f=0;f<totalFrames;f++){
    const p=f/fps; // seconds elapsed — entrance at 0-1s, waves drift after
    drawGraphic(cvs,g,brand,ratio,p);
    const bleedCvs=addBleed(cvs,10);
    const blob=await new Promise(r=>bleedCvs.toBlob(r,"image/png"));
    frames.push({name:`frame_${String(f+1).padStart(4,"0")}.png`,blob});
    if(onProgress) onProgress(f/totalFrames);
  }
  return frames;
}

// ═══════════════════════════════════════════════════════════════
//  RECORDING
// ═══════════════════════════════════════════════════════════════
const FPS=25;

// ── FFmpeg.wasm — WebM → MOV conversion (single-threaded, no special headers needed) ──
// FFmpeg + fetchFile: available via npm import (Next.js) or CDN global (standalone)
const _FFmpeg=typeof FFmpeg!=="undefined"?FFmpeg:(typeof window!=="undefined"&&window.FFmpeg)||null;
const _fetchFile=typeof fetchFile!=="undefined"?fetchFile:(typeof window!=="undefined"&&window.fetchFile)||(async b=>new Uint8Array(await new Response(b).arrayBuffer()));
let _ffmpeg=null;
async function getFFmpeg(){
  if(_ffmpeg&&_ffmpeg.loaded) return _ffmpeg;
  if(!_FFmpeg) throw new Error("FFmpeg not available — load @ffmpeg/ffmpeg from CDN or npm");
  _ffmpeg=new _FFmpeg();
  // Load single-threaded core from CDN (cached after first load, ~31MB)
  await _ffmpeg.load({
    coreURL:"https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js",
    wasmURL:"https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.wasm",
  });
  return _ffmpeg;
}

async function webmToMov(webmBlob, filename="output.mov", onProgress){
  const ff=await getFFmpeg();
  const inputName="input.webm";
  const outputName=filename.replace(/\.[^.]+$/,"")+".mov";
  // Write WebM to ffmpeg virtual filesystem
  await ff.writeFile(inputName, await _fetchFile(webmBlob));
  if(onProgress) ff.on("progress",({progress})=>onProgress(progress));
  // Convert: MOV container with PNG codec (preserves alpha channel)
  // -c:v png = lossless with alpha, Premiere imports natively
  await ff.exec(["-i",inputName,"-c:v","png","-pix_fmt","rgba","-an",outputName]);
  const data=await ff.readFile(outputName);
  // Clean up
  await ff.deleteFile(inputName);
  await ff.deleteFile(outputName);
  return new Blob([data.buffer],{type:"video/quicktime"});
}
// Convert array of PNG frame blobs to MOV with alpha (PNG codec)
async function pngSeqToMov(frames, fps=25, onProgress){
  const ff=await getFFmpeg();
  // Write all frames to ffmpeg virtual filesystem
  for(let i=0;i<frames.length;i++){
    const name=`frame_${String(i+1).padStart(4,"0")}.png`;
    await ff.writeFile(name, await _fetchFile(frames[i].blob||frames[i]));
  }
  if(onProgress) ff.on("progress",({progress})=>onProgress(progress));
  // Convert: PNG sequence → MOV with PNG codec (preserves alpha)
  await ff.exec([
    "-framerate",String(fps),
    "-i","frame_%04d.png",
    "-c:v","png",
    "-pix_fmt","rgba",
    "-an",
    "output.mov"
  ]);
  const data=await ff.readFile("output.mov");
  // Clean up frames
  for(let i=0;i<frames.length;i++){
    await ff.deleteFile(`frame_${String(i+1).padStart(4,"0")}.png`);
  }
  await ff.deleteFile("output.mov");
  return new Blob([data.buffer],{type:"video/quicktime"});
}

const MIME=()=>MediaRecorder.isTypeSupported("video/webm;codecs=vp9")?"video/webm;codecs=vp9":"video/webm";

function recordGraphic(g,brand,ratio){
  return new Promise(async(res,rej)=>{
    await document.fonts.ready; // ensure fonts loaded before recording
    const AR=RATIOS[ratio||"16:9"]||RATIOS["16:9"];
    const cvs=document.createElement("canvas");cvs.width=AR.W;cvs.height=AR.H;
    const durMs=Math.max(4000,(g.duration||4)*1000);  // minimum 4 seconds
    // captureStream(0) = capture on every canvas change (no frame rate limit)
    const rec=new MediaRecorder(cvs.captureStream(0),{mimeType:MIME(),videoBitsPerSecond:8000000});
    const ch=[];rec.ondataavailable=e=>{if(e.data.size>0)ch.push(e.data);};
    rec.onstop=()=>res(new Blob(ch,{type:"video/webm"}));rec.onerror=rej;
    rec.start();
    const startT=performance.now();
    const tick=()=>{
      const elapsed=performance.now()-startT;
      const p=elapsed/1000; // seconds elapsed = progress (entrance at 0-1, waves drift after)
      drawGraphic(cvs,g,brand,ratio,p);
      if(elapsed<durMs) requestAnimationFrame(tick);
      else rec.stop();
    };
    tick();
  });
}

function recordTitleCard(brand,ratio){
  return new Promise((res,rej)=>{
    const AR=RATIOS[ratio||"16:9"]||RATIOS["16:9"];
    const cvs=document.createElement("canvas");cvs.width=AR.W;cvs.height=AR.H;
    const frames=Math.round(2*FPS);
    const rec=new MediaRecorder(cvs.captureStream(FPS),{mimeType:MIME(),videoBitsPerSecond:8000000});
    const ch=[];rec.ondataavailable=e=>{if(e.data.size>0)ch.push(e.data);};
    rec.onstop=()=>res(new Blob(ch,{type:"video/webm"}));rec.onerror=rej;
    rec.start();let f=0;
    const tick=()=>{drawTitleCard(cvs,brand,ratio,clamp(f/(frames*0.35),0,1));f++;if(f<frames)requestAnimationFrame(tick);else rec.stop();};
    requestAnimationFrame(tick);
  });
}

function recordCaption(subtitle,brand,captionStyle,ratio){
  return new Promise((res,rej)=>{
    const AR=RATIOS[ratio||brand.aspectRatio||"9:16"]||RATIOS["9:16"];
    const cvs=document.createElement("canvas");cvs.width=AR.W;cvs.height=AR.H;
    const dur=(subtitle.endSec-subtitle.startSec)+0.15,frames=Math.ceil(dur*FPS);
    const rec=new MediaRecorder(cvs.captureStream(FPS),{mimeType:MIME(),videoBitsPerSecond:6000000});
    const ch=[];rec.ondataavailable=e=>{if(e.data.size>0)ch.push(e.data);};
    rec.onstop=()=>res(new Blob(ch,{type:"video/webm"}));rec.onerror=rej;
    rec.start();let f=0;
    const tick=()=>{drawCaption(cvs,subtitle,brand,captionStyle,f/FPS,ratio);f++;if(f<frames)requestAnimationFrame(tick);else rec.stop();};
    requestAnimationFrame(tick);
  });
}


// ═══════════════════════════════════════════════════════════════
//  COMPOSITE CAPTION RECORDER  — one full-length transparent WebM
// ═══════════════════════════════════════════════════════════════
function recordCompositeCaption(subtitles, brand, captionStyle, ratio, onProgress){
  return new Promise((resolve,reject)=>{
    if(!subtitles.length){ resolve(new Blob([])); return; }
    const AR=RATIOS[ratio||"9:16"]||RATIOS["9:16"];
    const cvs=document.createElement("canvas");cvs.width=AR.W;cvs.height=AR.H;
    const ctx=cvs.getContext("2d",{alpha:true});
    const totalDur=(subtitles[subtitles.length-1]?.endSec||10)+0.3;
    const totalFrames=Math.ceil(totalDur*FPS);
    const mime=MIME();
    const rec=new MediaRecorder(cvs.captureStream(FPS),{mimeType:mime,videoBitsPerSecond:8000000});
    const chunks=[];
    rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
    rec.onstop=()=>resolve(new Blob(chunks,{type:"video/webm"}));
    rec.onerror=reject;
    rec.start();
    let frame=0;
    const tick=()=>{
      const t=frame/FPS;
      ctx.clearRect(0,0,AR.W,AR.H);
      // find active subtitle at this timestamp
      const active=subtitles.find(s=>t>=s.startSec&&t<s.endSec);
      if(active) drawCaption(cvs,active,brand,captionStyle,t-active.startSec,ratio);
      if(onProgress) onProgress(frame/totalFrames);
      frame++;
      if(frame<totalFrames) requestAnimationFrame(tick);
      else rec.stop();
    };
    requestAnimationFrame(tick);
  });
}

    if(tpl==="timeline") return{label:headline,markers:markerStr.split(",").map(s=>s.trim()).filter(Boolean)};
    if(tpl==="endboard") return{headline,body,handle:text};
    if(tpl==="title_card") return{headline,subheadline:body,body:text};
    return{};
  };

  const handleAdd=()=>{
    const slug=(headline||body||text||stat||"custom").toLowerCase().replace(/[^a-z0-9]+/g,"-").slice(0,30);
    onAdd({
      id:Date.now(),timestamp:ts,duration:dur,
      type:meta.type,template:tpl,
      content:buildContent(),
      label:slug
    });
    onClose();
  };

  const sm=btn();
  const inp=inputS();
  const lbl=label();

  return(
    <div style={{...modalOverlay,zIndex:999,padding:20}} onClick={onClose}>
      <div style={modalBox({maxWidth:500,maxHeight:"85vh",overflowY:"auto"})} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",gap:DS.md,marginBottom:DS.lg+2}}>
          <div style={{fontWeight:900,fontSize:DS.fsLg,flex:1}}>+ Add Graphic</div>
          <button style={btnIcon()} onClick={onClose} title="Close">✕</button>
        </div>

        {/* Template picker */}
        <div style={{marginBottom:14}}>
          <label style={lbl}>TEMPLATE TYPE</label>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
            {Object.entries(TMPL).map(([k,v])=>(
              <button key={k} style={{...sm,padding:"7px 6px",fontSize:11,textAlign:"center",
                background:tpl===k?brand.colorAccent:"rgba(255,255,255,0.06)",
                border:`1px solid ${tpl===k?brand.colorAccent:"rgba(255,255,255,0.1)"}`}}
                onClick={()=>setTpl(k)}>
                <div style={{marginBottom:1}}>{v.type==="overlay"?"⬜":"⬛"}</div>
                {v.label}
              </button>
            ))}
          </div>
          <div style={{marginTop:6,fontSize:11,opacity:0.45}}>{isOv?"Overlay — transparent PNG, sits over footage":"Fullscreen — replaces footage momentarily"}</div>
        </div>

        {/* Timing */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div>
            <label style={lbl}>TIMESTAMP</label>
            <input value={ts} onChange={e=>setTs(e.target.value)} placeholder="HH:MM:SS" style={inp}/>
          </div>
          <div>
            <label style={lbl}>DURATION (seconds)</label>
            <input type="number" min={1} max={10} value={dur} onChange={e=>setDur(Number(e.target.value))} style={inp}/>
          </div>
        </div>

        {/* Content fields — contextual */}
        <div style={{display:"grid",gap:10,marginBottom:18}}>
          {["title","key_point","fact_box","timeline"].includes(tpl)&&(
            <div><label style={lbl}>{tpl==="timeline"?"CHART LABEL":"HEADLINE / LABEL"}</label><input value={headline} onChange={e=>setHeadline(e.target.value)} placeholder={tpl==="title"?"e.g. RULE #1":tpl==="timeline"?"e.g. CONTRACT PERIODS":"e.g. KEY POINT"} style={inp}/></div>
          )}
          {["myth","reality","key_point","fact_box","rule_number","title"].includes(tpl)&&(
            <div><label style={lbl}>{tpl==="title"?"SUBTITLE (optional)":"BODY TEXT"}</label><input value={body} onChange={e=>setBody(e.target.value)} placeholder="Keep it short — max 15 words" style={inp}/></div>
          )}
          {tpl==="speech_bubble"&&(
            <div><label style={lbl}>QUESTION TEXT</label><input value={text} onChange={e=>setText(e.target.value)} placeholder="e.g. Can I challenge this?" style={inp}/></div>
          )}
          {tpl==="stat"&&(<>
            <div><label style={lbl}>STAT VALUE</label><input value={stat} onChange={e=>setStat(e.target.value)} placeholder="e.g. 2% or 12 months" style={inp}/></div>
            <div><label style={lbl}>DESCRIPTION</label><input value={labelVal} onChange={e=>setLabelVal(e.target.value)} placeholder="e.g. max increase" style={inp}/></div>
          </>)}
          {["title","rule_number"].includes(tpl)&&(
            <div><label style={lbl}>NUMBER (large background)</label><input value={num} onChange={e=>setNum(e.target.value)} placeholder="e.g. 1" style={inp}/></div>
          )}
          {tpl==="timeline"&&(
            <div><label style={lbl}>MARKERS (comma-separated)</label><input value={markerStr} onChange={e=>setMarkerStr(e.target.value)} placeholder="6 months, 9 months, 12 months" style={inp}/></div>
          )}
        </div>

        <button style={btnCta({width:"100%"})} onClick={handleAdd}>
          + Add to Graphics List
        </button>
      </div>
    </div>
  );
}

//  SEGMENT EDIT PANEL — per-graphic prompt, template, and content editor
// ═══════════════════════════════════════════════════════════════
function SegmentEditPanel({g,index,brand,onRegenerate,onUpdateContent,onUpdateMeta,regenLoading,onClose,previewSrc,onRefreshPreview}){

    return `Generate a "${meta.label||g.template}" graphic at ${g.timestamp||"00:00:00"}. Content: ${parts}`;
  })();
  const [prompt,setPrompt]=useState(initPrompt);
  const [tplHint,setTplHint]=useState(g.templateHint||g.template||"any");
  const [localContent,setLocalContent]=useState({...g.content});
  // Reset state when switching to a different graphic
  useEffect(()=>{
    setPrompt(initPrompt);
    setTplHint(g.templateHint||g.template||"any");
    setLocalContent({...g.content});
  },[index]);
  const fields=TMPL_FIELDS[tplHint]||TMPL_FIELDS[g.template]||[];
  const sm=btn();
  const inp=inputS({resize:"vertical"});

  return(
    <div style={card({padding:`${DS.lg}px`,marginBottom:0})}>
      {/* Header + close */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:DS.md}}>
        <div style={sectionHead({marginBottom:0})}>EDIT SEGMENT #{index+1}</div>
        <button style={btnIcon()} onClick={onClose} title="Close editor">✕</button>
      </div>
      {/* Preview reference */}
      <div style={{position:"relative",marginBottom:DS.md}}>
        {previewSrc?<img src={previewSrc} alt="Current preview" style={{width:"100%",borderRadius:DS.rSm,border:`1px solid ${DS.borderSubtle}`,background:"repeating-conic-gradient(#444 0% 25%,#2a2a2a 0% 50%) 0 0/22px 22px"}}/>
          :<div style={{...emptyState({padding:`${DS.xl}px 0`,fontSize:DS.fsSm}),background:DS.bgCard,borderRadius:DS.rSm,border:`1px solid ${DS.borderSubtle}`}}>No preview yet</div>}
        {onRefreshPreview&&<button style={btnIcon({position:"absolute",top:DS.sm,right:DS.sm,background:"rgba(0,0,0,0.6)",border:"none"})} onClick={onRefreshPreview} title="Refresh preview">🔄</button>}
      </div>
      {/* Template + type selector */}
      <div style={{display:"flex",gap:DS.sm,alignItems:"center",marginBottom:DS.sm,flexWrap:"wrap"}}>
        <label style={label({marginBottom:0})}>TEMPLATE</label>
        <select value={tplHint} onChange={e=>setTplHint(e.target.value)}
          style={{background:DS.bgButton,border:`1px solid ${DS.borderMedium}`,borderRadius:DS.rSm,padding:"6px 10px",color:DS.textPrimary,fontSize:DS.fsSm,fontFamily:"inherit",outline:"none"}}>
          <option value="any" style={{background:"#1a2332"}}>Any (AI decides)</option>
          {Object.entries(TMPL).map(([k,v])=><option key={k} value={k} style={{background:"#1a2332"}}>{v.label} ({v.type})</option>)}
        </select>
      </div>
      {/* Render type: fullscreen vs overlay (transparent) */}
      <div style={{display:"flex",gap:DS.sm,marginBottom:DS.md}}>
        <label style={label({marginBottom:0,marginTop:3})}>RENDER</label>
        {[["fullscreen","⬛ Fullscreen","Solid background"],["overlay","⬜ Overlay","Transparent PNG"]].map(([type,icon,hint])=>{
          const currentType=g.typeOverride||(TMPL[g.template]||{}).type||"fullscreen";
          const active=currentType===type;
          return <button key={type} style={btn({background:active?DS.positive:DS.bgInput,border:`1px solid ${active?DS.positiveBorder:DS.borderSubtle}`,fontSize:11,padding:"6px 12px"})}
            onClick={()=>{onUpdateMeta({typeOverride:type});setTimeout(()=>onRefreshPreview&&onRefreshPreview(),150);}} title={hint}>{icon}</button>;
        })}
      </div>

      {/* Prompt editor */}
      <div style={{marginBottom:DS.md}}>
        <label style={label()}>AI PROMPT</label>
        <textarea value={prompt} onChange={e=>setPrompt(e.target.value)} rows={10} style={{...inp,minHeight:180}} placeholder="Describe what this graphic should show..."/>
      </div>

      {/* Content fields (direct edit) */}
      <div style={{marginBottom:DS.md}}>
        <label style={label()}>CONTENT (direct edit)</label>
        <div style={{display:"flex",flexDirection:"column",gap:DS.sm}}>
          {fields.map(f=>{
            const isLong=["body","text","headline","subheadline"].includes(f.key);
            return(
            <div key={f.key}>
              <label style={label()}>{f.label}</label>
              {isLong
                ?<textarea value={localContent[f.key]||""} onChange={e=>setLocalContent(c=>({...c,[f.key]:e.target.value}))}
                  placeholder={f.placeholder+"\n(Press Enter for line break)"} rows={3} style={{...inp,minHeight:60,resize:"vertical"}}/>
                :<input value={localContent[f.key]||""} onChange={e=>setLocalContent(c=>({...c,[f.key]:e.target.value}))}
                  placeholder={f.placeholder} style={inp}/>

        </div>
      </div>

      {/* Action buttons */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>

          style={{...sm,background:"rgba(42,157,143,0.15)",border:"1px solid rgba(42,157,143,0.3)"}}>
          💾 Save edits
        </button>
        <button onClick={onClose} style={sm}>Cancel</button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  LIVE VIDEO PREVIEW — video + graphics overlay
// ═══════════════════════════════════════════════════════════════
function LiveVideoPreview({videoUrl,graphics,brand,ratio,onSeek}){
  const containerRef=useRef();
  const videoRef=useRef();
  const canvasRef=useRef();
  const rafRef=useRef();
  const [playing,setPlaying]=useState(false);
  const [currentTime,setCT]=useState(0);
  const [duration,setDuration]=useState(0);
  const [showOverlay,setShowOverlay]=useState(true);
  const [showSZ,setShowSZ]=useState(false);

  const toSec=ts=>{if(!ts)return 0;const p=ts.split(":").map(Number);return(p[0]||0)*3600+(p[1]||0)*60+(p[2]||0);};
  const fmtTime=s=>{const m=Math.floor(s/60),sec=Math.floor(s%60);return`${m}:${String(sec).padStart(2,"0")}`;};

  // Find active graphics at current time
  const getActiveGraphics=(t)=>{
    return graphics.filter(g=>{
      const start=toSec(g.timestamp);
      const end=start+(g.duration||4);
      return t>=start&&t<end;
    }).map(g=>{
      const start=toSec(g.timestamp);
      const elapsed=t-start;
      const dur=g.duration||4;
      return{...g,progress:Math.min(elapsed/1,dur)}; // 1s entrance, then hold
    });
  };

  // Render loop
  useEffect(()=>{
    if(!canvasRef.current||!videoRef.current) return;
    const loop=()=>{
      const v=videoRef.current;
      if(!v) return;
      const t=v.currentTime;
      setCT(t);
      if(showOverlay){
        const active=getActiveGraphics(t);
        const c=canvasRef.current;
        const AR=RATIOS[ratio||"16:9"]||RATIOS["16:9"];
        c.width=AR.W;c.height=AR.H;
        const ctx=c.getContext("2d",{alpha:true});
        ctx.clearRect(0,0,AR.W,AR.H);
        // Draw each graphic on a temp canvas, then composite
        const tmp=document.createElement("canvas");
        active.forEach(g=>{
          drawGraphic(tmp,g,brand,ratio,g.progress);
          ctx.drawImage(tmp,0,0);
        });
        // Safe zone overlay
        if(showSZ) drawSafeZoneOverlay(ctx,AR.W,AR.H,ratio||"16:9");
      }
      rafRef.current=requestAnimationFrame(loop);
    };
    rafRef.current=requestAnimationFrame(loop);
    return()=>cancelAnimationFrame(rafRef.current);
  },[graphics,brand,ratio,showOverlay]);

  const togglePlay=()=>{
    const v=videoRef.current;if(!v) return;
    if(v.paused){v.play();setPlaying(true);}
    else{v.pause();setPlaying(false);}
  };

  const seek=(e)=>{
    const rect=e.currentTarget.getBoundingClientRect();
    const frac=(e.clientX-rect.left)/rect.width;
    const t=frac*duration;
    videoRef.current.currentTime=t;
    setCT(t);
    if(onSeek) onSeek(t);
  };

  // Active graphic indicators on timeline
  const gfxMarkers=graphics.map(g=>{
    const start=toSec(g.timestamp);
    const end=start+(g.duration||4);
    const meta=TMPL[g.template]||{};
    const isOv=(g.typeOverride||meta.type||"fullscreen")==="overlay";
    return{start,end,isOv,template:g.template};
  });

  return(
    <div ref={containerRef} style={{marginBottom:DS.xl,borderRadius:DS.rLg,overflow:"hidden",background:"#000",position:"relative"}}>
      {/* Video + canvas stack */}
      <div style={{position:"relative",paddingBottom:ratio==="9:16"?"177.78%":ratio==="1:1"?"100%":"56.25%"}}>
        <video ref={videoRef} src={videoUrl} style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",objectFit:"contain",background:"#000"}}
          onLoadedMetadata={e=>setDuration(e.target.duration)}
          onError={()=>{}} // Suppress blob URL errors after refresh
          onClick={togglePlay}
          playsInline muted/>
        {showOverlay&&<canvas ref={canvasRef} style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none"}}/>}
      </div>

      {/* Controls bar */}
      <div style={{background:"rgba(13,25,38,0.95)",padding:`${DS.sm}px ${DS.md}px`}}>
        {/* Timeline scrubber */}
        <div style={{position:"relative",height:32,cursor:"pointer",marginBottom:DS.xs}} onClick={seek}>
          {/* Background track */}
          <div style={{position:"absolute",top:12,left:0,right:0,height:8,background:"rgba(255,255,255,0.08)",borderRadius:4}}/>
          {/* Graphic markers */}
          {duration>0&&gfxMarkers.map((m,i)=>(
            <div key={i} style={{position:"absolute",top:10,left:`${(m.start/duration)*100}%`,width:`${Math.max(1,((m.end-m.start)/duration)*100)}%`,height:12,background:m.isOv?"rgba(42,157,143,0.5)":"rgba(230,57,70,0.4)",borderRadius:3,transition:"opacity 0.15s"}} title={m.template}/>
          ))}
          {/* Playhead */}
          <div style={{position:"absolute",top:6,left:`${duration>0?(currentTime/duration)*100:0}%`,width:3,height:20,background:"#fff",borderRadius:2,transform:"translateX(-1px)",boxShadow:"0 0 6px rgba(255,255,255,0.5)",transition:"left 0.05s linear"}}/>
        </div>

        {/* Buttons row */}
        <div style={{display:"flex",alignItems:"center",gap:DS.md}}>
          <button onClick={togglePlay} style={{background:"none",border:"none",color:"#fff",fontSize:18,cursor:"pointer",padding:"2px 6px"}}>{playing?"⏸":"▶"}</button>
          <span style={{fontSize:11,color:DS.textMuted,fontVariantNumeric:"tabular-nums"}}>{fmtTime(currentTime)} / {fmtTime(duration)}</span>
          <div style={{flex:1}}/>
          <button onClick={()=>setShowSZ(!showSZ)} style={{background:showSZ?"rgba(251,135,112,0.2)":"transparent",border:`1px solid ${showSZ?"rgba(251,135,112,0.4)":"rgba(255,255,255,0.1)"}`,borderRadius:DS.xs,padding:"3px 10px",color:"#fff",fontSize:11,cursor:"pointer",fontFamily:"inherit"}} title="Show social media safe zones">
            📐 {showSZ?"Safe ON":"Safe"}
          </button>
          <button onClick={()=>setShowOverlay(!showOverlay)} style={{background:showOverlay?"rgba(42,157,143,0.2)":"transparent",border:`1px solid ${showOverlay?"rgba(42,157,143,0.4)":"rgba(255,255,255,0.1)"}`,borderRadius:DS.xs,padding:"3px 10px",color:"#fff",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
            {showOverlay?"🎨 ON":"🎨 OFF"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  GRAPHICS TAB
// ═══════════════════════════════════════════════════════════════
function GraphicsTab({project,brand,updateProject,previewRatio}){
  const [gStep,setGStep]=useState(project.graphics.length>0?"review":"idle");
  const [animIdx,setAnimIdx]=useState(null);
  const [exporting,setExporting]=useState(new Set());
  const [progress,setProgress]=useState("");
  const [error,setError]=useState("");
  const [showAdd,setShowAdd]=useState(false);
  const [filterTpl,setFilterTpl]=useState("");
  const [showSafeZones,setShowSafeZones]=useState(false);
  const [showMoreActions,setShowMoreActions]=useState(false);
  const [reviewResults,setReviewResults]=useState(null);
  const [reviewing,setReviewing]=useState(false);
  const cvs=useRef(document.createElement("canvas"));

  const graphics=project.graphics;
  const filteredGraphics=filterTpl?graphics.filter(g=>g.template===filterTpl):graphics;
  const selected=new Set(project.selected||[]);
  const previews=project.previews||{};
  const setGraphics=gs=>{
    // Auto-sort by timecode so graphics always appear in video order
    const sorted=[...gs].sort((a,b)=>(a.timestamp||"").localeCompare(b.timestamp||""));
    updateProject({graphics:sorted,selected:[...sorted.keys()],previews:{}});
  };
  const setSelected=fn=>{const n=fn(selected);updateProject({selected:[...n]});};
  const setPreviews=fn=>updateProject(prev=>({previews:typeof fn==="function"?fn(prev.previews||{}):fn}));

  const analyse=async()=>{
    setGStep("analysing");setError("");
    try{
      const transcript=project.subtitles.map(s=>`[${s.start}] ${s.text}`).join("\n");
      const raw=await callAI({system:GFX_PROMPT,messages:[{role:"user",content:`Title:"${project.name}"\n\n${transcript}`}],max_tokens:8000});
      const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
      // Enrich each graphic with per-segment prompt and template hint
      const subs=project.subtitles||[];
      const enriched=parsed.map(g=>{
        // Find nearby transcript lines for context
        const ts=g.timestamp||"00:00:00";
        const tsSec=(h=>h[0]*3600+h[1]*60+h[2])(ts.split(":").map(Number));
        const nearby=subs.filter(s=>Math.abs((s.startSec||0)-tsSec)<8).map(s=>s.text).join(" ");
        const tplLabel=(TMPL[g.template]||{}).label||g.template;
        return{
          ...g,
          templateHint:g.template,
          prompt:`At ${ts} — generate a "${tplLabel}" graphic. Context: ${nearby.slice(0,200)}`,
        };
      });
      // Auto-insert title card at start and endboard at end
      const lastTs=enriched.length>0?enriched[enriched.length-1].timestamp:"00:03:00";
      const lastSec=(h=>h[0]*3600+h[1]*60+h[2])(lastTs.split(":").map(Number));
      const endTs=`${String(Math.floor((lastSec+5)/3600)).padStart(2,"0")}:${String(Math.floor(((lastSec+5)%3600)/60)).padStart(2,"0")}:${String((lastSec+5)%60).padStart(2,"0")}`;
      const withBookends=[
        {id:Date.now()-1,timestamp:"00:00:00",duration:5,type:"fullscreen",template:"title_card",content:{headline:brand.titleCardTitle||project.name,subheadline:brand.titleCardSeriesName||"",body:brand.titleCardSubtitle||"",style:brand.titleCardStyle||"split"},label:"title-card"},
        ...enriched,
        {id:Date.now()+1,timestamp:endTs,duration:6,type:"fullscreen",template:"endboard",content:{headline:brand.endboardCTA||"Thanks for watching",body:"Like and subscribe for more",handle:brand.endboardHandles||"@cpshomes",website:brand.endboardWebsite||"cpshomes.co.uk",style:brand.endboardStyle||"logo"},label:"endboard"},
      ];
      setGraphics(withBookends);setGStep("review");
    }catch(e){setError("Analysis failed: "+e.message+(e.message.includes("fetch")?" — check your API key in Settings":""));setGStep("idle");}
  };

  const doPreview=useCallback(async(g,i)=>{
    await document.fonts.ready;
    const canvas=document.createElement("canvas");
    drawGraphic(canvas,g,brand,previewRatio,1);
    // Downscale for storage efficiency while keeping sharpness
    const AR=RATIOS[previewRatio]||RATIOS["16:9"];
    const thumbW=Math.min(AR.W,1200),thumbH=Math.round(thumbW*(AR.H/AR.W));
    const thumb=document.createElement("canvas");thumb.width=thumbW;thumb.height=thumbH;
    const tCtx=thumb.getContext("2d");tCtx.imageSmoothingEnabled=true;tCtx.imageSmoothingQuality="high";
    tCtx.drawImage(canvas,0,0,thumbW,thumbH);
    setPreviews(p=>({...p,[i]:thumb.toDataURL("image/png")}));
  },[brand,previewRatio]);

  const previewAll=useCallback(async()=>{
    await document.fonts.ready;
    const batch={};const AR=RATIOS[previewRatio]||RATIOS["16:9"];
    const thumbW=Math.min(AR.W,1200),thumbH=Math.round(thumbW*(AR.H/AR.W));
    graphics.forEach((g,i)=>{
      const canvas=document.createElement("canvas");
      drawGraphic(canvas,g,brand,previewRatio,1);
      const thumb=document.createElement("canvas");thumb.width=thumbW;thumb.height=thumbH;
      const tCtx=thumb.getContext("2d");tCtx.imageSmoothingEnabled=true;tCtx.imageSmoothingQuality="high";
      tCtx.drawImage(canvas,0,0,thumbW,thumbH);
      batch[i]=thumb.toDataURL("image/png");
    });
    updateProject({previews:batch});
  },[graphics,brand,previewRatio]);

  const exportWebM=async(g,i)=>{
    setExporting(s=>{const n=new Set(s);n.add(i);return n;});
    try{const blob=await recordGraphic(g,brand,previewRatio);const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`${String(i+1).padStart(2,"0")}_${g.label||g.template}_animated.webm`;a.click();}
    catch(e){alert("Export failed: "+e.message);}
    setExporting(s=>{const n=new Set(s);n.delete(i);return n;});
  };

  const exportSelectedBatch=async()=>{
    const sel=[...selected].sort((a,b)=>a-b);
    if(!sel.length){alert("Select graphics to export first.");return;}
    // Export still PNGs
    for(const i of sel){
      const g=graphics[i]; if(!g) continue;
      drawGraphic(cvs.current,g,brand,previewRatio,1);
      const dataUrl=cvs.current.toDataURL("image/png");
      const a=document.createElement("a");a.href=dataUrl;
      a.download=`${String(i+1).padStart(2,"0")}_${g.label||g.template}_still.png`;a.click();
    }
    // Export animated WebMs
    for(const i of sel){
      const g=graphics[i]; if(!g) continue;
      setExporting(s=>{const n=new Set(s);n.add(i);return n;});
      try{
        const blob=await recordGraphic(g,brand,previewRatio);
        const a=document.createElement("a");a.href=URL.createObjectURL(blob);
        a.download=`${String(i+1).padStart(2,"0")}_${g.label||g.template}_animated.webm`;a.click();
      }catch{}
      setExporting(s=>{const n=new Set(s);n.delete(i);return n;});
    }
  };

  const toggleGraphicType=(i)=>{
    const ng=[...graphics];
    const g=ng[i]; if(!g) return;
    const defaultType=(TMPL[g.template]||{}).type||"fullscreen";
    const currentType=g.typeOverride||defaultType;
    ng[i]={...g,typeOverride:currentType==="overlay"?"fullscreen":"overlay"};
    setGraphics(ng);
